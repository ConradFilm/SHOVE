@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(245,158,11,.4)}50%{text-shadow:0 0 40px rgba(245,158,11,.8)}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@keyframes wave2{0%,100%{d:path("M0,200 C200,100 400,300 700,200 C900,150 1100,250 1200,200 L1200,400 L0,400Z")}50%{d:path("M0,180 C200,280 400,140 700,220 C900,260 1100,170 1200,190 L1200,400 L0,400Z")}}
@keyframes wave3{0%,100%{d:path("M0,300 C400,250 600,350 1200,280 L1200,400 L0,400Z")}50%{d:path("M0,290 C400,340 600,270 1200,310 L1200,400 L0,400Z")}}
@keyframes tileLeave{0%{opacity:1;transform:scale(1) translateY(0)}20%{opacity:.9;transform:scale(1.03) translateY(-3px)}70%{opacity:.5;transform:scale(.85) translateY(8px)}100%{opacity:0;transform:scale(.65) translateY(18px)}}
@keyframes aiThink{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes shoveRight{0%{transform:translateX(0) translateY(0);opacity:1}60%{transform:translateX(18px) translateY(0);opacity:1}80%{transform:translateX(22px) translateY(0);opacity:.8}100%{transform:translateX(24px) translateY(14px);opacity:0}}55%{transform:translateX(14px) translateY(10px);opacity:0}56%{transform:translateX(-6px) translateY(-4px);opacity:0}100%{transform:translateX(0) translateY(0);opacity:1}}50%{transform:translateX(6px) translateY(-3px);opacity:1}100%{transform:translateX(0) translateY(0);opacity:.7}}60%{transform:translateX(18px) translateY(0);opacity:1}80%{transform:translateX(22px) translateY(0);opacity:.8}100%{transform:translateX(24px) translateY(14px);opacity:0}}
@keyframes commentFade{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes stoneReturn{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.25);opacity:1}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes wordReveal{0%{opacity:0;transform:scale(.7) translateY(8px)}60%{opacity:1;transform:scale(1.08) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
@keyframes wordOverlay{0%{opacity:0;transform:scale(.85)}12%{opacity:1;transform:scale(1)}85%{opacity:1}100%{opacity:0;transform:scale(1.04)}}
@keyframes returnPop{0%{transform:scale(0) rotate(-20deg);opacity:0}45%{transform:scale(1.4) rotate(2deg);opacity:1;filter:brightness(1.8)}70%{transform:scale(1.05) rotate(-.5deg);filter:brightness(1.2)}85%{transform:scale(.97)}100%{transform:scale(1) rotate(0);opacity:1;filter:brightness(1)}}
@keyframes arrowIn{0%{transform:scale(0) rotate(-10deg);opacity:0}80%{transform:scale(1.12) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes wordBreathe{0%{transform:scale(1);text-shadow:0 0 20px currentColor}50%{transform:scale(1.18);text-shadow:0 0 50px currentColor}100%{transform:scale(1);text-shadow:0 0 20px currentColor}}
@keyframes letterPulse{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.35);filter:brightness(2.2)}100%{transform:scale(1);filter:brightness(1.3)}}
@keyframes pulseSel{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.7),0 0 12px rgba(245,158,11,.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,1),0 0 32px rgba(245,158,11,.8)}}
@keyframes pulseJump{0%,100%{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.25)}50%{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.55)}}
.wave-bg{position:fixed;bottom:0;left:0;width:100%;height:35%;opacity:.12;pointer-events:none;z-index:0}
.wave-bg path:nth-child(1){animation:wave1 7s ease-in-out infinite}
.wave-bg path:nth-child(2){animation:wave2 9s ease-in-out infinite}
.wave-bg path:nth-child(3){animation:wave3 11s ease-in-out infinite}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:8px 6px;min-height:100vh;width:100%;max-width:820px}
.title{font-size:48px;font-weight:900;color:#f59e0b;letter-spacing:6px;text-shadow:0 0 30px rgba(245,158,11,.5);animation:glow 3s ease-in-out infinite}
.title-sm{font-size:22px;font-weight:900;color:#e07820;letter-spacing:3px;text-shadow:0 0 15px rgba(224,120,32,.3)}
.board{display:inline-grid;padding:12px;background:rgba(0,30,60,.65);border-radius:14px;border:2px solid rgba(255,255,255,.1);box-shadow:0 8px 32px rgba(0,0,0,.4);position:relative}
.cell{border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.06);transition:border-color .15s,background .15s}
.tile{width:100%;height:100%;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;border:2px solid;transition:all .2s;font-family:'Libre Franklin',sans-serif}
.tile.p1{background:#e07820;border-color:#b55e0e;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.tile.p2{background:#9b6ab5;border-color:#7a4a94;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.tile.active-sel{box-shadow:0 0 0 3px #fff,0 0 0 5px #e07820,0 0 20px rgba(224,120,32,.8)!important;transform:scale(1.12);z-index:10;filter:brightness(1.15)}
.active-jumped{box-shadow:0 0 0 3px #fff,0 0 0 5px #93c5fd,0 0 20px rgba(147,197,253,.8)!important;transform:scale(1.12);z-index:10;filter:brightness(1.15)}
.tile.returned{animation:stoneReturn .6s cubic-bezier(.34,1.2,.64,1) forwards;box-shadow:0 0 24px 8px rgba(147,197,253,.55)}
.cell.h-sel{animation:pulseSel .9s ease-in-out infinite;border-color:rgba(245,158,11,1)!important;background:rgba(245,158,11,.12)!important}
.cell.h-free{animation:pulseJump 1.4s ease-in-out infinite;cursor:pointer}
.cell.h-free:hover{background:rgba(96,165,250,.25)!important;border-color:rgba(96,165,250,.7)!important}
.cell.hl-row{background:rgba(76,175,80,.3)!important;border-color:rgba(76,175,80,.9)!important;box-shadow:0 0 12px rgba(76,175,80,.4)}
.cell.hl-col{background:rgba(66,165,245,.25)!important;border-color:rgba(66,165,245,.85)!important;box-shadow:0 0 12px rgba(66,165,245,.4)}
.push-arrow{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:900;z-index:18;animation:arrowIn .25s ease-out;cursor:pointer;width:34px;height:34px}
.push-arrow.ok{background:rgba(245,158,11,.9);border:2px solid #f59e0b;color:#78350f;box-shadow:0 2px 14px rgba(245,158,11,.45)}
.push-arrow.ok:hover{background:#f59e0b;transform:scale(1.15)}
.push-arrow.bad{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);color:rgba(255,255,255,.18);pointer-events:none}
.comment-bar{width:100%;min-height:36px;max-height:80px;overflow:hidden;margin:5px 0;padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;line-height:1.6;color:rgba(255,255,255,.85);text-align:center}
.comment-bar.hl{border-color:rgba(76,175,80,.3);background:rgba(76,175,80,.06)}
.comment-bar.gold{border-color:rgba(245,158,11,.3);color:#f59e0b;background:rgba(245,158,11,.06)}
.comment-bar.human{border-color:rgba(96,165,250,.35);color:#93c5fd;background:rgba(96,165,250,.07)}
.comment-bar.ai{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.phase-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:2px;margin:4px 0}
.phase-badge.you{background:rgba(245,158,11,.18);color:#fbbf24;border:1px solid rgba(245,158,11,.35);animation:glow 1.8s ease-in-out infinite}
.phase-badge.ki{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.phase-badge.end{background:rgba(255,215,0,.2);color:#ffd700;border:1px solid rgba(255,215,0,.4)}
.stone-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:420px;margin:2px 0}
.stone-count{flex:1;text-align:center;padding:5px 6px;border-radius:10px}
.stone-count.p1c{background:rgba(224,120,32,.1);border:1px solid rgba(224,120,32,.4)}
.stone-count.p2c{background:rgba(155,106,181,.1);border:1px solid rgba(155,106,181,.4)}
.stone-num{font-size:24px;font-weight:900}
.stone-lbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.7)}
.sc-pip{border-radius:50%;display:inline-block}
.sc-pip.p1{background:radial-gradient(circle at 35% 35%,#f0922a,#c05e08);border:2px solid #c05e08}
.sc-pip.p2{background:radial-gradient(circle at 35% 35%,#b87fd4,#7a4a94);border:2px solid #7a4a94}
.controls{display:flex;gap:12px;align-items:center;justify-content:center;position:sticky;bottom:0;background:#0f172a;padding:12px 8px 14px;margin-top:8px;border-top:1px solid rgba(255,255,255,.07);z-index:20;width:100%;box-sizing:border-box}
.ctrl-btn{padding:14px 28px;font-size:11px;font-weight:700;letter-spacing:1px;border:2px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:Georgia,serif;transition:all .15s;min-height:48px}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn.gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border-color:#d97706}
.ctrl-btn.blue{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.35);color:#93c5fd}
.board-viewport{overflow:visible;position:relative;touch-action:none;border-radius:14px}

<div class="controls" id="mainControls" style="display:none">

</div>
<script>
window.onerror=function(msg,src,line,col,err){
  const app=document.getElementById('app');
  if(app){
    const d=document.createElement('div');
    d.style.cssText='position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;padding:8px;font-size:11px;z-index:999;font-family:monospace';
    d.textContent='JS Error: '+msg+' (line '+line+')';
    document.body.prepend(d);
    setTimeout(()=>d.remove(),8000);
  }
  return false;
};
</script>

function K(x,y){return x+","+y;}
function PK(k){const[x,y]=k.split(",").map(Number);return{x,y};}
function cnt(b,p){return Object.values(b).filter(s=>s&&s.owner===p).length;}
function letterAt(x,y){
  if(!currentBoardDef)return "?";
  const row=currentBoardDef.rows[y];
  if(!row)return "?";
  const ch=row[x];
  return (typeof ch==="string"&&ch&&ch!=="·")?ch:"?";
}

function pickBoard(){
  if(_usedBoardIndices.length>=BOARD_POOL.length)_usedBoardIndices=[];
  const avail=BOARD_POOL.map((_,i)=>i).filter(i=>!_usedBoardIndices.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  _usedBoardIndices.push(idx);return BOARD_POOL[idx];
}

function buildStartBoard(preset){
  const b={};
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    if(x===6&&y===5)continue;
    b[K(x,y)]={owner:P1,ch:preset.rows[y][x]};
  }
  return b;
}

// ═══ PUSH MECHANICS ═══
function computePush(b,px,py,dx,dy,d){
  const pieces=[];let cx=px,cy=py;
  while(cx>=0&&cx<G&&cy>=0&&cy<G){const k=K(cx,cy);if(b[k])pieces.push({x:cx,y:cy,...b[k]});cx+=dx;cy+=dy;}
  if(!pieces.length)return null;
  const np=[{...pieces[0],origX:pieces[0].x,origY:pieces[0].y,x:pieces[0].x+dx*d,y:pieces[0].y+dy*d}];
  for(let i=1;i<pieces.length;i++){
    const prev=np[i-1],orig=pieces[i];let nx=orig.x,ny=orig.y;
    if(dx)nx=dx>0?Math.max(orig.x,prev.x+dx):Math.min(orig.x,prev.x+dx);
    if(dy)ny=dy>0?Math.max(orig.y,prev.y+dy):Math.min(orig.y,prev.y+dy);
    np.push({...orig,origX:orig.x,origY:orig.y,x:nx,y:ny});
  }
  const removed=[],remaining=[];
  for(const p of np)(p.x<0||p.x>=G||p.y<0||p.y>=G?removed:remaining).push(p);
  return{removed,remaining,originalPieces:pieces};
}

function getPushesFrom(b,player,fx,fy){
  const moves=[];
  for(const dir of DIRS){
    for(let d=1;d<G*2;d++){
      const r=computePush(b,fx,fy,dir.dx,dir.dy,d);if(!r)break;
      const oppR=r.removed.filter(p=>p.owner!==player).length;
      const ownR=r.removed.filter(p=>p.owner===player).length;
      if(oppR>0&&ownR===0){
        const pKeys=new Set(r.originalPieces.map(p=>K(p.x,p.y)));
        let overlap=false;
        for(const p of r.remaining)if(b[K(p.x,p.y)]&&!pKeys.has(K(p.x,p.y))){overlap=true;break;}
        const nx=fx+dir.dx*d,ny=fy+dir.dy*d;
        if(!overlap&&nx>=0&&nx<G&&ny>=0&&ny<G)moves.push({x:fx,y:fy,dir,d,result:r,destX:nx,destY:ny});
      }
      if(fx+dir.dx*d<0||fx+dir.dx*d>=G||fy+dir.dy*d<0||fy+dir.dy*d>=G)break;
    }
  }
  return moves;
}

function getPushMoves(b,player){
  const moves=[];
  for(const k in b){
    if(!b[k]||b[k].owner!==player)continue;
    const{x,y}=PK(k);moves.push(...getPushesFrom(b,player,x,y));
  }
  return moves;
}

function applyPush(b,m){
  const nb=Object.assign({},b);
  for(const p of m.result.originalPieces)delete nb[K(p.x,p.y)];
  for(const p of m.result.remaining)nb[K(p.x,p.y)]={owner:p.owner,ch:p.ch};
  return nb;
}

function applyJump(b,fx,fy,tx,ty){
  const nb=Object.assign({},b);const t=nb[K(fx,fy)];delete nb[K(fx,fy)];nb[K(tx,ty)]=t;return nb;
}

// ═══ WORD DETECTION ═══
function findWordsInLine(cells){
  const words=[];let i=0;
  while(i<cells.length){
    if(!cells[i]){i++;continue;}
    let j=i;while(j<cells.length&&cells[j])j++;
    const seg=cells.slice(i,j);
    if(seg.length>=4){
      const found=[];
      for(let a=0;a<seg.length;a++)for(let b=a+4;b<=seg.length;b++){
        const w=seg.slice(a,b).map(c=>c.ch.toUpperCase()).join("");
        if(WORDS.has(w.toLowerCase()))found.push({word:w,start:i+a,end:i+b-1});
      }
      for(const w of found){
        if(!found.some(o=>o!==w&&o.start<=w.start&&o.end>=w.end))words.push(w);
      }
    }
    i=j;
  }
  return words;
}

function findAllWords(b){
  const all=[],used=new Set();
  for(let y=0;y<G;y++){
    const row=[];for(let x=0;x<G;x++)row.push(b[K(x,y)]||null);
    const ws=findWordsInLine(row);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(i,y));w.dir="row";});
    all.push(...ws);
  }
  for(let x=0;x<G;x++){
    const col=[];for(let y=0;y<G;y++)col.push(b[K(x,y)]||null);
    const ws=findWordsInLine(col);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(x,i));w.dir="col";});
    all.push(...ws);
  }
  all.forEach(w=>{const key=w.cells.join("|")+w.word;if(used.has(key))return;used.add(key);});
  return all.filter((w,i,a)=>a.findIndex(x=>x.cells.join("|")+x.word===w.cells.join("|")+w.word)===i);
}

function wordKey(w){const line=w.dir==="row"?w.cells[0].split(",")[1]:w.cells[0].split(",")[0];return w.dir+line+w.word;}

function getNewWords(before,after){
  if(!before||!after)return[];
  const bKeys=new Set(before.map(wordKey));
  const newW=after.filter(w=>!bKeys.has(wordKey(w)));
  if(!newW.length)return[];
  const byLine=new Map();
  for(const w of newW){
    const lk=w.dir==="row"?`row-${w.cells[0].split(",")[1]}`:`col-${w.cells[0].split(",")[0]}`;
    if(!byLine.has(lk)||w.word.length>byLine.get(lk).word.length)byLine.set(lk,w);
  }
  const winners=[...byLine.values()];
  const max=Math.max(...winners.map(w=>w.word.length));
  return winners.filter(w=>w.word.length===max);
}

// ═══ STONE RETURN ═══
function returnStonesAnimated(player,count,onDone){
  _stonesReturning=true;
  // All currently empty cells
  let empty=[];
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    const k=K(x,y);if(!board[k])empty.push({k,x,y});
  }
  for(let i=empty.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[empty[i],empty[j]]=[empty[j],empty[i]];}
  const actual=Math.min(count,empty.length);
  if(actual===0){_stonesReturning=false;if(onDone)setTimeout(()=>onDone(0),400);return 0;}
  _returnTimers.forEach(t=>clearTimeout(t));_returnTimers=[];
  for(let i=0;i<actual;i++){
    const{k,x,y}=empty[i];
    _returnTimers.push(setTimeout(()=>{
      if(!_stonesReturning)return;// cancelled by BACK
      board[k]={owner:player,ch:letterAt(x,y)||"?"};
      returnedKeys=new Set([k]);render();
      _returnTimers.push(setTimeout(()=>{returnedKeys.delete(k);},1600));
      if(i===actual-1)_returnTimers.push(setTimeout(()=>{
        returnedKeys=new Set();_stonesReturning=false;
        if(onDone)onDone(actual);
      },2000));
    },i*2000+400));
  }
  return actual;
}

    for(const p of removed){
      const el=document.createElement("div");
      el.style.cssText=`position:absolute;width:${CELL}px;height:${CELL}px;left:${p.origX*(CELL+GAP)+12}px;top:${p.origY*(CELL+GAP)+12}px;border-radius:8px;background:${p.owner===P1?"rgba(224,120,32,.4)":"rgba(155,106,181,.4)"};animation:tileLeave 3.5s cubic-bezier(.25,0,.1,1) forwards;z-index:8;pointer-events:none`;
      be.appendChild(el);setTimeout(()=>el.remove(),3600);
    }
  },30);
}

function animateSlidePush(push,onDone){
  const be=document.querySelector(".board");
  if(!be){if(onDone)onDone();return;}
  const movers=(push.result?.remaining||[]).filter(p=>p.origX!==p.x||p.origY!==p.y);
  const removed=push.result?.removed||[];
  const allMoved=[...movers,...removed];
  for(const p of allMoved){
    const cells=be.querySelectorAll('.cell');
    cells.forEach((cell,idx)=>{
      if(idx%G===p.origX&&Math.floor(idx/G)===p.origY){const t=cell.querySelector('.tile');if(t)t.style.opacity='0';}
    });
  }
  const overlays=[];
  for(const p of movers){
    const el=document.createElement("div");
    const color=p.owner===P1?"#e07820":"#9b6ab5",bc=p.owner===P1?"#b55e0e":"#7a4a94";
    el.style.cssText=`position:absolute;width:${CELL}px;height:${CELL}px;left:${p.origX*(CELL+GAP)+12}px;top:${p.origY*(CELL+GAP)+12}px;border-radius:7px;background:${color};border:2.5px solid ${bc};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;font-family:'Libre Franklin',sans-serif;color:#fff;z-index:30;pointer-events:none;transition:left 2s cubic-bezier(.4,0,.2,1),top 2s cubic-bezier(.4,0,.2,1)`;
    el.textContent=p.ch||"·";be.appendChild(el);
    overlays.push({el,toLeft:p.x*(CELL+GAP)+12,toTop:p.y*(CELL+GAP)+12});
  }
  for(const p of removed){
    const el=document.createElement("div");
    const color=p.owner===P1?"#e07820":"#9b6ab5",bc=p.owner===P1?"#b55e0e":"#7a4a94";
    el.style.cssText=`position:absolute;width:${CELL}px;height:${CELL}px;left:${p.origX*(CELL+GAP)+12}px;top:${p.origY*(CELL+GAP)+12}px;border-radius:7px;background:${color};border:2.5px solid ${bc};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;font-family:'Libre Franklin',sans-serif;color:#fff;z-index:28;pointer-events:none;transition:left 2s cubic-bezier(.4,0,.2,1),top 2s cubic-bezier(.4,0,.2,1),opacity 1s 1s`;
    const dx=push.dir.dx,dy=push.dir.dy;
    el.textContent=p.ch||"·";be.appendChild(el);
    overlays.push({el,toLeft:p.origX*(CELL+GAP)+12+dx*CELL*1.5,toTop:p.origY*(CELL+GAP)+12+dy*CELL*1.5,isRemoved:true});
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    for(const{el,toLeft,toTop,isRemoved} of overlays){
      el.style.left=toLeft+'px';el.style.top=toTop+'px';if(isRemoved)el.style.opacity='0';
    }
  }));
  _sliding=true;
  _slideTimer=setTimeout(()=>{_slideTimer=null;_sliding=false;for(const{el} of overlays)el.remove();if(onDone)onDone();},2100);
}

function animateWordBirth(newWords,onDone){
  if(!newWords||newWords.length===0){if(onDone)onDone();return;}
  const maxLen=Math.max(...newWords.map(w=>w.word.length));
  const w=newWords.find(x=>x.word.length===maxLen)||newWords[0];
  const isRow=w.dir==="row";
  const color=isRow?"#4caf50":"#42a5f5";
  // Phase 1: letters pulse on board sequentially
  const be=document.querySelector(".board");
  if(be){
    w.cells.forEach((k,i)=>{
      setTimeout(()=>{
        const{x,y}=PK(k);
        const cellEl=[...be.querySelectorAll('.cell')].find((_,idx)=>{
          const cx=idx%G,cy=Math.floor(idx/G);return cx===x&&cy===y;
        });
        if(cellEl){
          const tileEl=cellEl.querySelector('.tile');
          if(tileEl){
            tileEl.style.animation='letterPulse .5s ease-out forwards';
            tileEl.style.boxShadow=`0 0 16px 4px ${color}88`;
            setTimeout(()=>{if(tileEl){tileEl.style.animation='';tileEl.style.boxShadow='';}},600);
          }
        }
      },i*80);
    });
  }
  // Phase 2: word in zone below board
  const totalLetterTime=w.cells.length*80+100;
  setTimeout(()=>{
    const isMob=window.innerWidth<600;
    const zone=document.getElementById("wordZoneMob");
    if(!zone)return;
    const maxPerWord=isMob?60:52;
    const zoneH=isMob?120:110;
    const baseFs=Math.floor(zoneH/Math.max(newWords.length,1)*0.85);
    const nCount=newWords.filter(ww=>ww&&typeof ww.word==="string"&&ww.word).length;
    zone.innerHTML=newWords.map(ww=>{
      if(!ww||typeof ww.word!=="string"||!ww.word)return "";
      const c=ww.dir==="row"?"#4caf50":"#42a5f5";
      const maxW=isMob?window.innerWidth:Math.min(500,window.innerWidth);
      const fsByWidth=Math.floor(maxW*0.78/Math.max(ww.word.length,3));
      const fsPerLine=nCount===1?52:nCount===2?36:nCount===3?28:22;
      const fs=Math.min(fsPerLine,fsByWidth);
      return `<div style="font-size:${fs}px;font-weight:900;color:${c};letter-spacing:${nCount>2?'2px':'3px'};font-family:'Libre Franklin',sans-serif;text-shadow:0 0 20px ${c}88;animation:wordReveal .4s ease-out forwards,wordBreathe 1.8s .4s ease-in-out infinite;line-height:1.2">${ww.word.toUpperCase()}</div>`;
    }).join('');
    _wordOverlay={remove:()=>{const z=document.getElementById("wordZoneMob");if(z)z.innerHTML="";}};
  },totalLetterTime);
  const totalTime=totalLetterTime+5800;// 3 breath cycles;
  if(onDone)setTimeout(onDone,totalTime);
}


function applyWordHL(newWords){
  wordHLMap={};
  if(!newWords.length)return;
  const max=Math.max(...newWords.map(w=>w.word.length));
  for(const w of newWords.filter(w=>w.word.length===max)){
    const cls=w.dir==="row"?"hl-row":"hl-col";for(const c of w.cells)wordHLMap[c]=cls;
  }
}

// ═══ BOT AI ═══
function shuffled(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function kiScore(myCount,oppCount,eliminated,stonesBack,longestWord,oppAfter,isJump){
  let sc=eliminated*10;
  if(oppAfter<=3)sc+=300;else if(oppAfter<=6)sc+=60;else if(oppAfter<=10)sc+=20;
  if(stonesBack>0){
    sc+=stonesBack*10;
    if(myCount+oppCount>30)sc+=stonesBack*10;else if(myCount+oppCount>20)sc+=stonesBack*7;
    if(myCount<=10)sc+=stonesBack*15;if(myCount<=6)sc+=stonesBack*25;
    if(longestWord>=6)sc+=40;else if(longestWord>=5)sc+=25;else if(longestWord>=4)sc+=12;
  }
  if(isJump)sc+=5;sc+=Math.random()*3;return sc;
}

function kiPickBestMove(b,player){
  const opp=player===P1?P2:P1;
  const myCount=cnt(b,player),oppCount=cnt(b,opp);
  const beforeWords=findAllWords(b);const bSet=new Set(beforeWords.map(wordKey));
  let best=null,bestScore=-99999;
  const allPushes=getPushMoves(b,player);
  const pushList=kiLevel===1?shuffled(allPushes).slice(0,Math.max(1,Math.floor(allPushes.length*0.6))):allPushes;
  for(const p of pushList){
    const nb=applyPush(b,p);
    const nw=findAllWords(nb).filter(w=>!bSet.has(wordKey(w)));
    const lw=nw.length>0?Math.max(...nw.map(w=>w.word.length)):0;
    const el=p.result.removed.filter(x=>x.owner!==player).length;
    const sc=kiScore(myCount,oppCount,el,nw.length>0?el:0,lw,cnt(nb,opp),false);
    if(sc>bestScore){bestScore=sc;best={push:p,jumped:false,result:p.result,word:nw[0]||null};}
  }
  if(kiLevel===1)return best;
  const myTiles=[];for(const k in b)if(b[k]&&b[k].owner===player)myTiles.push(PK(k));
  const empty=[];for(let y=0;y<G;y++)for(let x=0;x<G;x++)if(!b[K(x,y)])empty.push({x,y});
  for(const t of myTiles){
    const near=empty.filter(j=>DIRS.some(d=>{const nx=j.x+d.dx,ny=j.y+d.dy;return nx>=0&&nx<G&&ny>=0&&ny<G&&b[K(nx,ny)]&&b[K(nx,ny)].owner===opp;}));
    for(const jt of (near.length>0?near:empty).slice(0,20)){
      const bj=applyJump(b,t.x,t.y,jt.x,jt.y);
      for(const pf of getPushesFrom(bj,player,jt.x,jt.y)){
        const nb2=applyPush(bj,pf);
        const nw2=findAllWords(nb2).filter(w=>!bSet.has(wordKey(w)));
        const lw2=nw2.length>0?Math.max(...nw2.map(w=>w.word.length)):0;
        const el2=pf.result.removed.filter(x=>x.owner!==player).length;
        const sc2=kiScore(myCount,oppCount,el2,nw2.length>0?el2:0,lw2,cnt(nb2,opp),true);
        if(sc2>bestScore){bestScore=sc2;best={push:pf,jumped:true,jump:{fromX:t.x,fromY:t.y,toX:jt.x,toY:jt.y,ch:b[K(t.x,t.y)].ch},result:pf.result,word:nw2[0]||null};}
      }
    }
  }
  return best;
}

// ═══ BOARD REVEAL ═══
function startBoardReveal(){
  currentBoardDef=pickBoard();
  const base=buildStartBoard(currentBoardDef);
  revealBoard={};revealOwners={};revealOrder=[];revealProgress=0;revealDone=false;
  const keys=Object.keys(base);const sh=[...keys];
  for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
  sh.forEach((k,i)=>{revealOwners[k]=i<Math.ceil(sh.length/2)?P1:P2;});
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){const k=K(x,y);if(base[k])revealOrder.push(k);}
  simPhase="board-reveal";render();
  setTimeout(()=>revealTick(),120);
}

function revealTick(){
  if(revealProgress>=revealOrder.length){revealDone=true;render();return;}
  const k=revealOrder[revealProgress];const{x,y}=PK(k);
  revealBoard[k]={owner:revealOwners[k],ch:currentBoardDef.rows[y][x]};
  revealProgress++;render();
  const delay=PK(revealOrder[revealProgress-1]).x===0&&revealProgress>1?360:110;
  revealTimer=setTimeout(()=>revealTick(),delay);
}

function chooseStarter(humanStarts){
  humanStartsGame=humanStarts;simPhase="color-pick";render();
  if(humanStarts){
    setTimeout(()=>{
      const kiOrange=Math.random()<0.5;aiPlayer=kiOrange?P1:P2;humanPlayer=kiOrange?P2:P1;
      turn=humanPlayer;simPhase="ki-decided";render();
    },2200);
  }
}

function chooseColor(color){
  humanPlayer=color==="orange"?P1:P2;aiPlayer=color==="orange"?P2:P1;
  turn=aiPlayer;simPhase="ki-decided";render();
}

function startGame(){
  const base=buildStartBoard(currentBoardDef);board={};
  for(const k in base)board[k]={...base[k],owner:revealOwners[k]||P1};
  moveNum=0;gameEnding=false;wordHLMap={};comment="";commentCls="";
  history=[];returnedKeys=new Set();prevBoard=null;postPushBoard=null;
  gameStats={p1elim:0,p1words:0,p1ret:0,p2elim:0,p2words:0,p2ret:0,missedMoves:[]};
  simPhase="pushing";
}

function checkGameEnd(){
  const c1=cnt(board,P1),c2=cnt(board,P2);if(c1>3&&c2>3)return false;
  gameEnding=true;
  const loser=c1<=3?P1:P2,winner=loser===P1?P2:P1;
  const lCount=Math.min(c1,c2);
  comment=winner===humanPlayer
    ?`<b style="color:#4caf50">You win.</b> Bot has only ${lCount} letter${lCount!==1?"s":""} left.`
    :`<b style="color:#ef4444">Bot wins.</b> You have only ${lCount} letter${lCount!==1?"s":""} left.`;
  commentCls="gold";wordHLMap={};render();
  setTimeout(()=>{simPhase="gameover";render();},2000);
  return true;
}

// ═══ HUMAN TURN ═══
function startHumanTurn(){
  hPhase="select";hSel=null;hDest=null;
  let hasMoves=getPushMoves(board,humanPlayer).length>0;
  if(!hasMoves){
    outer:for(const k in board){
      if(!board[k]||board[k].owner!==humanPlayer)continue;
      const{x,y}=PK(k);
      for(let jy=0;jy<G;jy++)for(let jx=0;jx<G;jx++){
        if(board[K(jx,jy)])continue;
        if(getPushesFrom(applyJump(board,x,y,jx,jy),humanPlayer,jx,jy).length>0){hasMoves=true;break outer;}
      }
    }
  }
  if(!hasMoves){
    comment="No legal moves for you — Bot's turn.";commentCls="ai";
    hPhase="idle";render();timer=setTimeout(()=>humanAITurn(),1500);return;
  }
  comment='<b>Your turn.</b> Select one of your <span style="color:#e07820;font-weight:900">orange</span> letters.';
  commentCls="human";render();
}

function handleCellClick(x,y){
  if(turn!==humanPlayer||simPhase!=="pushing"||gameEnding)return;
  const k=K(x,y);
  if(hPhase==="select"){
    if(board[k]&&board[k].owner===humanPlayer){hSel={x,y};hPhase="selected";setHumanComment();render();}
  } else if(hPhase==="selected"){
    if(board[k]&&board[k].owner===humanPlayer){hSel={x,y};hJumpDone=false;setHumanComment();render();return;}
    if(!board[k]&&!hJumpDone){hDest={x,y};hPhase="jumped";hJumpDone=true;board=applyJump(board,hSel.x,hSel.y,x,y);setHumanComment();render();}
  } else if(hPhase==="jumped"){
    if(board[k]&&board[k].owner===humanPlayer){
      board=applyJump(board,hDest.x,hDest.y,hSel.x,hSel.y);
      hSel={x,y};hDest=null;hPhase="selected";setHumanComment();render();
    }
  }
}

function setHumanComment(){
  if(hPhase==="selected"&&hSel){
    const ch=board[K(hSel.x,hSel.y)]?.ch||"?";
    const col="ABCDEFG"[hSel.x],row=hSel.y+1;
    const dp=getPushesFrom(board,humanPlayer,hSel.x,hSel.y);
    if(!dp.length){comment=`<b>${ch}</b> at ${col}${row} — no push from here. Click any empty square to reposition first.`;commentCls="human";}
    else{comment=`<b>${ch}</b> at ${col}${row} selected. Push an arrow — or click any empty square to jump first.`;commentCls="human";}
  } else if(hPhase==="jumped"&&hDest){
    const ch=board[K(hDest.x,hDest.y)]?.ch||"?";
    const fc="ABCDEFG"[hSel.x],fr=hSel.y+1,tc="ABCDEFG"[hDest.x],tr=hDest.y+1;
    comment=`<b>${ch}</b> jumped from ${fc}${fr} to ${tc}${tr}. Now choose a push direction.`;commentCls="human";
  }
}

function humanPushExact(idx){
  if(turn!==humanPlayer||simPhase!=="pushing"||gameEnding)return;
  const origin=hDest||hSel;if(!origin)return;
  const p=getPushesFrom(board,humanPlayer,origin.x,origin.y)[idx];
  if(!p)return;humanDoPush(p);
}

function humanDoPush(push){
  const pieceCh=board[K(push.x,push.y)]?.ch||"?";
  const beforeWords=findAllWords(board);
  moveNum++;saveSnap();animateFall(push);
  prevBoard=JSON.parse(JSON.stringify(board));kiSelPos=null;
  // Compare to bot optimal for perception mirror
  try{
    const ko=kiPickBestMove(prevBoard,humanPlayer);
    if(ko&&ko.push){
      const kbj=ko.jumped?applyJump(prevBoard,ko.jump.fromX,ko.jump.fromY,ko.jump.toX,ko.jump.toY):prevBoard;
      const knb=applyPush(kbj,ko.push);
      const kw=getNewWords(beforeWords,findAllWords(knb));
      const kk=ko.push.result.removed.filter(x=>x.owner!==humanPlayer).length;
      const kills=push.result.removed.filter(x=>x.owner!==humanPlayer).length;
      const afterW=getNewWords(beforeWords,findAllWords(applyPush(board,push)));
      const kl=kw.length>0?Math.max(...kw.map(w=>w.word.length)):0;
      const hl=afterW.length>0?Math.max(...afterW.map(w=>w.word.length)):0;
      if(((kw.length>0&&afterW.length===0)||(kl>=hl+2)||(kk>kills+1))&&gameStats.missedMoves.length<5){
        gameStats.missedMoves.push({moveNum,kiWords:kw.map(w=>w.word),kiLongest:kl,kiKills:kk,
          humanWords:afterW.map(w=>w.word),humanKills:kills,
          kiMove:{x:ko.push.x,y:ko.push.y,dir:ko.push.dir.n,destX:ko.push.destX,destY:ko.push.destY},
          jumped:ko.jumped||false,jumpFrom:ko.jumped?{x:ko.jump.fromX,y:ko.jump.fromY}:null,
          jumpTo:ko.jumped?{x:ko.jump.toX,y:ko.jump.toY}:null});
      }
    }
  }catch(e){}
  animateSlidePush(push,()=>{
    board=applyPush(board,push);postPushBoard=JSON.parse(JSON.stringify(board));
    const afterWords=findAllWords(board);const newWords=getNewWords(beforeWords,afterWords);
    hPhase="idle";hSel=null;hDest=null;
    const kills=push.result.removed.filter(x=>x.owner!==humanPlayer).length;
    gameStats[humanPlayer===P1?'p1elim':'p2elim']+=kills;
    const fc=String.fromCharCode(65+push.x),fr=push.y+1;
    const tc=String.fromCharCode(65+push.destX),tr=push.destY+1;
    if(newWords.length>0){
      applyWordHL(newWords);
      gameStats[humanPlayer===P1?'p1words':'p2words']++;
      const wn=newWords.map(w=>`<span style="color:${w.dir==="row"?"#4caf50":"#42a5f5"};font-weight:900">${w.word}</span>`).join(" · ");
      comment=`Move ${moveNum} — <b>${pieceCh}</b> ${fc}${fr}→${tc}${tr} · ${kills} off · ${wn}`;
      commentCls="hl";
      animateWordBirth(newWords,()=>{
        // 4 breaths done — board still highlighted
        const z=document.getElementById("wordZoneMob");if(z)z.innerHTML="";
        // wordHLMap stays — board letters still highlighted!
        pendingNextTurn=()=>{
          pendingNextTurn=null;
          wordHLMap={};render();
          floatReturn(push,kills);
          const ret=returnStonesAnimated(humanPlayer,kills,(n)=>{
            gameStats[humanPlayer===P1?'p1ret':'p2ret']+=n||ret;
            comment=`<span style="color:#93c5fd">+${n||ret} letter${(n||ret)!==1?"s":""} won.</span>`;
            commentCls="human";
            pendingNextTurn=()=>{turn=aiPlayer;if(!checkGameEnd())setTimeout(()=>humanAITurn(),600);};
            render();
          });
          comment=`<span style="color:#93c5fd">+${ret} letter${ret!==1?"s":""} won.</span>`;
          commentCls="human";render();
          if(ret===0){pendingNextTurn=()=>{turn=aiPlayer;if(!checkGameEnd())setTimeout(()=>humanAITurn(),600);};render();}
        }
        render();
      });
    } else {
      comment=`Move ${moveNum} — <b>${pieceCh}</b> ${fc}${fr}→${tc}${tr} · ${kills} off · no word`;
      commentCls="";wordHLMap={};
      pendingNextTurn=()=>{turn=aiPlayer;if(!checkGameEnd())setTimeout(()=>humanAITurn(),600);};
    }
    render();
  });
}

// ═══ BOT TURN ═══
function floatReturn(push,count){
  setTimeout(()=>{
    const be=document.querySelector(".board");if(!be)return;
    const el=document.createElement("div");
    const x=push.destX,y=push.destY;
    el.style.cssText=`position:absolute;left:${x*(CELL+GAP)+12}px;top:${y*(CELL+GAP)}px;color:#93c5fd;font-size:12px;font-weight:900;pointer-events:none;z-index:20;animation:scoreFloat 1.2s ease-out forwards;white-space:nowrap`;
    el.textContent=`+${count} ✦`;
    be.appendChild(el);setTimeout(()=>el.remove(),1300);
  },200);
}

function botThinkingMsg(){
  const tile=`display:inline-block;width:18px;height:18px;border-radius:4px;background:#e07820;border:1.5px solid #b55e0e;font-size:10px;font-family:'Libre Franklin',sans-serif;font-weight:800;color:#fff;text-align:center;line-height:16px`;
  return `<span style="display:inline-flex;gap:10px;align-items:center;vertical-align:middle;margin:0 6px">
    <span style="${tile};animation:shoveRight 3.2s ease-in-out infinite">S</span>
    <span style="${tile};animation:shoveRight 3.2s ease-in-out infinite;animation-delay:.5s">H</span>
    <span style="${tile};animation:shoveRight 3.2s ease-in-out infinite;animation-delay:1s">O</span>
    <span style="${tile};animation:shoveRight 3.2s ease-in-out infinite;animation-delay:1.5s">V</span>
    <span style="${tile};animation:shoveRight 3.2s ease-in-out infinite;animation-delay:2s">E</span>
  </span>`;
}

function humanAITurn(){
  if(gameEnding)return;
  turn=aiPlayer;kiSelPos=null;
  comment=botThinkingMsg();commentCls="ai";render();
  timer=setTimeout(()=>{
    const best=kiPickBestMove(board,aiPlayer);
    if(!best){comment="Bot has no moves — your turn.";commentCls="ai";turn=humanPlayer;render();setTimeout(()=>startHumanTurn(),1600);return;}
    // Preview word
    const ch=board[K(best.jumped?best.jump.fromX:best.push.x,best.jumped?best.jump.fromY:best.push.y)]?.ch||"?";
    // Use same word-detection logic as kiPickBestMove
    const simB=best.jumped?applyJump(board,best.jump.fromX,best.jump.fromY,best.jump.toX,best.jump.toY):board;
    const bwSimSet=new Set(findAllWords(simB).map(wordKey));
    const pwAll=findAllWords(applyPush(simB,best.push)).filter(w=>!bwSimSet.has(wordKey(w)));
    const pwMax=pwAll.length>0?Math.max(...pwAll.map(w=>w.word.length)):0;
    const pw=pwAll.filter(w=>w.word.length===pwMax);
    let wAnn="";
    if(pw.length>0){
      wAnn="Bot sees "+pw.map(w=>{
        const dir=w.dir==="row"?`row ${parseInt(w.cells[0].split(",")[1])+1}`:`col ${"ABCDEFG"[parseInt(w.cells[0].split(",")[0])]}`;
        const col=w.dir==="row"?"#4caf50":"#42a5f5";
        return `<b style="color:${col}">${w.word}</b> in ${dir}`;
      }).join(" · ");
    }
    // Execute push helper
    const doBotPush=()=>{
      pendingNextTurn=null;
      saveSnap();moveNum++;
      const bw2=findAllWords(board);prevBoard=JSON.parse(JSON.stringify(board));
      animateFall(best.push);kiSelPos=null;render();
      animateSlidePush(best.push,()=>{
        board=applyPush(board,best.push);postPushBoard=JSON.parse(JSON.stringify(board));
        const nw2=getNewWords(bw2,findAllWords(board));
        const kills=best.push.result.removed.filter(x=>x.owner!==aiPlayer).length;
        gameStats[aiPlayer===P1?'p1elim':'p2elim']+=kills;
        if(nw2.length>0){
          applyWordHL(nw2);
          gameStats[aiPlayer===P1?'p1words':'p2words']++;
          const wn=nw2.map(w=>`<span style="color:${w.dir==="row"?"#4caf50":"#42a5f5"};font-weight:900">${w.word}</span>`).join(" · ");
          comment=`Bot · ${wn} · ${kills} letter${kills!==1?"s":""} off`;
          commentCls="hl";botTurnPhase=2;render();
          // Phase 2: breathing (4x). NEXT greyed. After breath → phase 3.
          _breathing=true;
          animateWordBirth(nw2,()=>{
            _breathing=false;
            const z=document.getElementById("wordZoneMob");if(z)z.innerHTML="";
            // Phase 3: return-ready. Board still highlighted. NEXT active.
            // Save snap here so BACK can restore to this exact state.
            botReturnSnap={
              board:JSON.parse(JSON.stringify(board)),
              wordHLMap:JSON.parse(JSON.stringify(wordHLMap)),
              comment:comment,commentCls:commentCls,
              kills:kills,aiPlayer:aiPlayer,push:best.push
            };
            botTurnPhase=3;
            comment=`<span style="color:#93c5fd">+${kills} letter${kills!==1?"s":""} won — press NEXT</span>`;
            commentCls="human";
            pendingNextTurn=()=>{
              // Phase 4: stones returning
              botTurnPhase=4;
              pendingNextTurn=null;
              wordHLMap={};
              floatReturn(best.push,kills);
              comment=`<span style="color:#93c5fd">+${kills} letter${kills!==1?"s":""} won.</span>`;
              commentCls="human";render();
              const ret=returnStonesAnimated(aiPlayer,kills,(n)=>{
                // Phase 5: returned
                botTurnPhase=5;botReturnSnap=null;
                gameStats[aiPlayer===P1?'p1ret':'p2ret']+=n||ret;
                comment=`<span style="color:#93c5fd">+${n||ret} letter${(n||ret)!==1?"s":""} won.</span>`;
                commentCls="human";render();
                setTimeout(()=>{
                botTurnPhase=0;
                pendingNextTurn=()=>{pendingNextTurn=null;turn=humanPlayer;if(!checkGameEnd()){render();startHumanTurn();}};
                render();
              },1200);
              });
              if(ret===0){botTurnPhase=0;botReturnSnap=null;pendingNextTurn=()=>{pendingNextTurn=null;turn=humanPlayer;if(!checkGameEnd()){render();startHumanTurn();}};render();}
            };
            render();
          });
        } else {
          comment=`Bot · ${kills} letter${kills!==1?"s":""} off · no word`;commentCls="ai";wordHLMap={};
          botTurnPhase=0;turn=humanPlayer;render();setTimeout(()=>{if(!checkGameEnd())startHumanTurn();},1200);
        }
      });
    };
    kiSelPos=best.jumped?{x:best.jump.fromX,y:best.jump.fromY}:{x:best.push.x,y:best.push.y};
    if(best.jumped){
      const fc="ABCDEFG"[best.jump.fromX],fr=best.jump.fromY+1;
      const tc="ABCDEFG"[best.jump.toX],tr=best.jump.toY+1;
      const pc="ABCDEFG"[best.push.destX],pr=best.push.destY+1;
      comment=`${wAnn?wAnn+" — ":""}<b>${ch}</b> at ${fc}${fr} jumps to ${tc}${tr}`;commentCls="ai";
      pendingNextTurn=()=>{
        board=applyJump(board,best.jump.fromX,best.jump.fromY,best.jump.toX,best.jump.toY);
        kiSelPos={x:best.jump.toX,y:best.jump.toY};
        comment=`${wAnn?wAnn+" — ":""}<b>${ch}</b> pushes ${tc}${tr}→${pc}${pr}`;commentCls="ai";
        pendingNextTurn=()=>doBotPush();render();
      };
    } else {
      const fc="ABCDEFG"[best.push.x],fr=best.push.y+1;
      const tc="ABCDEFG"[best.push.destX],tr=best.push.destY+1;
      comment=`${wAnn?wAnn+" — ":""}<b>${ch}</b> pushes ${fc}${fr}→${tc}${tr}`;commentCls="ai";
      pendingNextTurn=()=>doBotPush();
    }
    render();
  },8000);
}

      } else {
        // Stack arrows ALONG their push direction — no overlap possible
        const sorted=[...matching].sort((a,b)=>
          a.p.result.removed.filter(r=>r.owner!==humanPlayer).length-
          b.p.result.removed.filter(r=>r.owner!==humanPlayer).length);
        sorted.forEach(({p,i},n)=>{
          const kills=p.result.removed.filter(r=>r.owner!==humanPlayer).length;
          const step=36;
          // Stack in push direction: right→right, down→down, left→left, up→up
          const ax=lx+(dir.dx!==0?dir.dx*n*step:0);
          const ay=ly+(dir.dy!==0?dir.dy*n*step:0);
          bHtml+=`<div class="push-arrow ok" style="position:absolute;left:${ax}px;top:${ay}px" onclick="humanPushExact(${i})"><span style="font-size:14px;line-height:1;color:#fff">${dir.n}</span><span style="font-size:9px;font-weight:900;color:#fff">×${kills}</span></div>`;
        });
      }
    }
  }
  const vpW=Math.min(400,window.innerWidth-16);
  const sc3=Math.min(1,(vpW-28)/(G*(CELL+GAP)+GAP));
  app.innerHTML=`${badge}
    <div class="stone-bar">
      <div class="stone-count ${humanPlayer===P1?"p1c":"p2c"}">
        <div class="stone-lbl">YOU</div>
        <div class="stone-num" style="color:${myColor}">${myCount}</div>
        <div class="stone-lbl">${humanPlayer===P1?"ORANGE":"VIOLET"}</div>
      </div>
      <div style="font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;padding:0 8px">VS</div>
      <div class="stone-count ${aiPlayer===P1?"p1c":"p2c"}">
        <div class="stone-lbl">BOT</div>
        <div class="stone-num" style="color:${aiColor}">${aiCount}</div>
        <div class="stone-lbl">${aiPlayer===P1?"ORANGE":"VIOLET"}</div>
      </div>
    </div>
    <div class="comment-bar ${commentCls}"><span id="commentText" style="display:inline-block;animation:commentFade .4s ease-out">${comment||"&nbsp;"}</span></div>
    <div style="width:${vpW}px;overflow:visible;position:relative;height:${Math.round((G*(CELL+GAP))*sc3+32)}px">
      <div id="boardInner" style="transform-origin:top center;transform:scale(${sc3});position:absolute;top:14px;left:50%;translate:-50% 0">
        <div style="position:relative">${bHtml}</div>
      </div>
    </div>
    <div id="wordZoneMob" style="width:100%;text-align:center;padding:20px 0 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;"></div>`;
  // Update button states
  mc.querySelector('#btnBack').style.opacity=history.length>0?'1':'0.25';
  mc.querySelector('#btnPlay').style.opacity=(pendingNextTurn&&!_stonesReturning)?'1':'0.25';

  mc.querySelector('#btnPlay').textContent='▶ NEXT';
  requestAnimationFrame(()=>{
    const span=document.getElementById('commentText');
    if(span){span.style.animation='none';void span.offsetWidth;span.style.animation='commentFade .4s ease-out';}
    _applyZoom();
  });
}

// ═══ NAVIGATION ═══
function onPlay(){
  if(_stonesReturning)return;
  if(simPhase==="ki-decided"){
    startGame();render();
    if(turn===humanPlayer)setTimeout(()=>startHumanTurn(),1000);
    else setTimeout(()=>humanAITurn(),800);
    return;
  }
  if(pendingNextTurn){
    if(_wordOverlay){_wordOverlay.remove();_wordOverlay=null;}
    const fn=pendingNextTurn;pendingNextTurn=null;wordHLMap={};
    fn();
    return;
  }
}

function onBack(){
  if(_sliding||_breathing)return;// wait for animation to finish
  const now=Date.now();
  if(onBack._last&&now-onBack._last<600)return;
  onBack._last=now;

  const savedPhase=botTurnPhase;

  // Always clear
  _stonesReturning=false;
  _sliding=false;
  _breathing=false;
  botTurnPhase=0;botReturnSnap=null;
  if(_birthTimer){clearTimeout(_birthTimer);_birthTimer=null;}
  if(_slideTimer){clearTimeout(_slideTimer);_slideTimer=null;}
  _sliding=false;
  _returnTimers.forEach(t=>clearTimeout(t));_returnTimers=[];
  if(timer){clearTimeout(timer);timer=null;}
  pendingNextTurn=null;
  if(_wordOverlay){_wordOverlay.remove();_wordOverlay=null;}
  const wz=document.getElementById("wordZoneMob");if(wz)wz.innerHTML="";
  wordHLMap={};returnedKeys=new Set();

  if(simPhase==="rules"){simPhase="intro";render();return;}
  if(simPhase==="board-reveal"){if(revealTimer)clearTimeout(revealTimer);fullReset();simPhase="intro";render();return;}
  if(simPhase==="color-pick"||simPhase==="ki-decided"){simPhase="board-reveal";revealDone=true;render();return;}

  if(simPhase==="pushing"&&!gameEnding){
    // Human: deselect stone
    if(turn===humanPlayer&&(hPhase==="selected"||hPhase==="jumped")){
      if(hPhase==="jumped"&&hDest){
        // Undo jump: stone back at original, still selected, no more jumps this turn
        board=applyJump(board,hDest.x,hDest.y,hSel.x,hSel.y);
        hDest=null;hPhase="selected";hJumpDone=true;
        setHumanComment();render();return;
      }
      // Just selected (no jump) — deselect
      hSel=null;hDest=null;hPhase="select";
      comment='<b>Your turn.</b> Select one of your <span style="color:#e07820;font-weight:900">orange</span> letters.';
      commentCls="human";render();return;
    }
    // Any bot phase (2,3,4,5) OR human turn: pop history one step
    if(history.length>0){
      restoreSnap(JSON.parse(history.pop()));
      kiSelPos=null;returnedKeys=new Set();
      wordHLMap={};botTurnPhase=0;botReturnSnap=null;
      if(turn===humanPlayer){
        hPhase="select";hSel=null;hDest=null;
        setHumanComment();
      } else {
        comment=botThinkingMsg();commentCls="ai";
        timer=setTimeout(()=>humanAITurn(),2000);
      }
      render();return;
    }
  }
}

// ═══ ZOOM ═══
function _applyZoom(){
  const inn=document.getElementById("boardInner");if(!inn)return;
  inn.style.opacity="1";
}

// ═══ INIT ═══
fullReset();render();
</script>
</body>
</html>
