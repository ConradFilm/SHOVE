<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100dvh;background:linear-gradient(160deg,#0a1628,#0d2137 40%,#0f2b46);font-family:Georgia,'Times New Roman',serif;display:flex;flex-direction:column;align-items:center;color:#fff;user-select:none;overflow-x:hidden}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(245,158,11,.4)}50%{text-shadow:0 0 40px rgba(245,158,11,.8)}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes wave1{0%,100%{d:path("M0,100 C300,200 600,0 900,100 C1050,150 1150,50 1200,100 L1200,400 L0,400Z")}50%{d:path("M0,120 C300,60 600,180 900,80 C1050,40 1150,130 1200,110 L1200,400 L0,400Z")}}
@keyframes wave2{0%,100%{d:path("M0,200 C200,100 400,300 700,200 C900,150 1100,250 1200,200 L1200,400 L0,400Z")}50%{d:path("M0,180 C200,280 400,140 700,220 C900,260 1100,170 1200,190 L1200,400 L0,400Z")}}
@keyframes wave3{0%,100%{d:path("M0,300 C400,250 600,350 1200,280 L1200,400 L0,400Z")}50%{d:path("M0,290 C400,340 600,270 1200,310 L1200,400 L0,400Z")}}
@keyframes tileLeave{0%{opacity:1;transform:scale(1) translateY(0)}20%{opacity:.9;transform:scale(1.03) translateY(-3px)}70%{opacity:.5;transform:scale(.85) translateY(8px)}100%{opacity:0;transform:scale(.65) translateY(18px)}}
@keyframes aiThink{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes shoveRight{0%{transform:translateX(0) translateY(0);opacity:1}60%{transform:translateX(18px) translateY(0);opacity:1}80%{transform:translateX(22px) translateY(0);opacity:.8}100%{transform:translateX(24px) translateY(14px);opacity:0}}
@keyframes commentFade{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes stoneReturn{0%{transform:translateY(40px) scale(0.2);opacity:0;filter:blur(6px) brightness(3)}30%{opacity:0.6;filter:blur(1px) brightness(1.8)}55%{transform:translateY(-4px) scale(1.07);opacity:0.95;filter:blur(0) brightness(1.15)}75%{transform:translateY(1px) scale(0.99);filter:brightness(1)}90%{transform:translateY(-1px) scale(1.01)}100%{transform:translateY(0) scale(1);opacity:1;filter:none}}
@keyframes wordReveal{0%{opacity:0;transform:scale(.7) translateY(8px)}60%{opacity:1;transform:scale(1.08) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
@keyframes wordOverlay{0%{opacity:0;transform:scale(.85)}12%{opacity:1;transform:scale(1)}85%{opacity:1}100%{opacity:0;transform:scale(1.04)}}
@keyframes returnPop{0%{transform:scale(0) rotate(-20deg);opacity:0}45%{transform:scale(1.4) rotate(2deg);opacity:1;filter:brightness(1.8)}70%{transform:scale(1.05) rotate(-.5deg);filter:brightness(1.2)}85%{transform:scale(.97)}100%{transform:scale(1) rotate(0);opacity:1;filter:brightness(1)}}
@keyframes arrowIn{0%{transform:scale(0) rotate(-10deg);opacity:0}80%{transform:scale(1.12) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes wordBreathe{0%{transform:scale(1);text-shadow:0 0 20px currentColor}50%{transform:scale(1.18);text-shadow:0 0 50px currentColor}100%{transform:scale(1);text-shadow:0 0 20px currentColor}}
@keyframes letterPulse{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.35);filter:brightness(2.2)}100%{transform:scale(1);filter:brightness(1.3)}}
@keyframes pulseSel{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.7),0 0 12px rgba(245,158,11,.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,1),0 0 32px rgba(245,158,11,.8)}}
@keyframes pulseJump{0%,100%{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.25)}50%{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.55)}}
.wave-bg{position:fixed;bottom:0;left:0;width:100%;height:35%;opacity:.12;pointer-events:none;z-index:0}
.wave-bg path:nth-child(1){animation:wave1 7s ease-in-out infinite}
.wave-bg path:nth-child(2){animation:wave2 9s ease-in-out infinite}
.wave-bg path:nth-child(3){animation:wave3 11s ease-in-out infinite}
#app{position:relative;display:flex;flex-direction:column;align-items:center;padding:8px 6px;width:100%;max-width:820px}
.title{font-size:48px;font-weight:900;color:#f59e0b;letter-spacing:6px;text-shadow:0 0 30px rgba(245,158,11,.5);animation:glow 3s ease-in-out infinite}
.title-sm{font-size:22px;font-weight:900;color:#e07820;letter-spacing:3px;text-shadow:0 0 15px rgba(224,120,32,.3)}
.board{display:inline-grid;padding:12px;background:rgba(0,30,60,.65);border-radius:20px;border:2px solid rgba(255,255,255,.1);box-shadow:0 20px 40px rgba(0,0,0,.45),0 6px 12px rgba(0,0,0,.35);position:relative}
@keyframes endgamePulse{0%,100%{border-color:rgba(60,180,180,.4)}50%{border-color:rgba(100,220,220,.85)}}
.board.endgame{animation:endgamePulse 4s ease-in-out infinite}
.cell{border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.06);transition:border-color .15s,background .15s}
.tile{width:100%;height:100%;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;border:2px solid;transition:all .2s;font-family:'Libre Franklin',sans-serif}
.tile.p1{background:#e07820;border-color:#b55e0e;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.tile.p2{background:#9b6ab5;border-color:#7a4a94;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.tile.active-sel{box-shadow:0 0 0 3px #fff,0 0 0 5px #e07820,0 0 20px rgba(224,120,32,.8)!important;transform:scale(1.12);z-index:10;filter:brightness(1.15)}
.active-jumped{box-shadow:0 0 0 3px #fff,0 0 0 5px #93c5fd,0 0 20px rgba(147,197,253,.8)!important;transform:scale(1.12);z-index:10;filter:brightness(1.15)}
.tile.returned{position:relative;z-index:5;animation:stoneReturn 1.6s cubic-bezier(.2,.5,.3,1) forwards;box-shadow:0 0 16px 3px rgba(224,120,32,.55),0 0 6px 1px rgba(224,120,32,.4)}
.tile.p1.returned{box-shadow:0 0 16px 3px rgba(224,120,32,.6),0 0 6px 1px rgba(224,120,32,.45)}
.tile.p2.returned{box-shadow:0 0 16px 3px rgba(155,106,181,.6),0 0 6px 1px rgba(155,106,181,.45)}
.cell.h-sel{animation:pulseSel .9s ease-in-out infinite;border-color:rgba(245,158,11,1)!important;background:rgba(245,158,11,.12)!important}
.cell.h-free{animation:pulseJump 1.4s ease-in-out infinite;cursor:pointer}
.cell.h-free:hover{background:rgba(96,165,250,.25)!important;border-color:rgba(96,165,250,.7)!important}
.cell.hl-row{background:rgba(76,175,80,.3)!important;border-color:rgba(76,175,80,.9)!important;box-shadow:0 0 12px rgba(76,175,80,.4)}
.cell.hl-col{background:rgba(66,165,245,.25)!important;border-color:rgba(66,165,245,.85)!important;box-shadow:0 0 12px rgba(66,165,245,.4)}
.word-box{position:absolute;border-radius:10px;pointer-events:none;z-index:12}
.tile.in-word,.tile.p1.in-word,.tile.p2.in-word,.tile.returned.in-word{background:rgba(8,20,50,.82)!important;border-color:rgba(255,255,255,.1)!important;box-shadow:none!important;filter:none!important}
@keyframes wordBoxIn{0%{opacity:0;transform:scale(.94)}100%{opacity:1;transform:scale(1)}}
@keyframes killBadgeIn{0%{opacity:0;transform:scale(0)}60%{transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
.push-arrow{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:900;z-index:18;animation:arrowIn .25s ease-out;cursor:pointer;width:34px;height:34px}
.push-arrow.ok{background:rgba(245,158,11,.9);border:2px solid #f59e0b;color:#78350f;box-shadow:0 2px 14px rgba(245,158,11,.45)}
.push-arrow.ok:hover{background:#f59e0b;transform:scale(1.15)}
.push-arrow.bad{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);color:rgba(255,255,255,.18);pointer-events:none}
.comment-bar{width:100%;min-height:36px;max-height:80px;overflow:hidden;margin:5px 0;padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;line-height:1.6;color:rgba(255,255,255,.85);text-align:center}
.comment-bar.hl{border-color:rgba(76,175,80,.3);background:rgba(76,175,80,.06)}
.comment-bar.gold{border-color:rgba(245,158,11,.3);color:#f59e0b;background:rgba(245,158,11,.06)}
.comment-bar.human{border-color:rgba(96,165,250,.35);color:#93c5fd;background:rgba(96,165,250,.07)}
.comment-bar.ai{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.phase-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:2px;margin:4px 0}
.phase-badge.you{background:rgba(245,158,11,.18);color:#fbbf24;border:1px solid rgba(245,158,11,.35);animation:glow 1.8s ease-in-out infinite}
.phase-badge.ki{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.phase-badge.end{background:rgba(255,215,0,.2);color:#ffd700;border:1px solid rgba(255,215,0,.4)}
.stone-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:420px;margin:2px 0}
.stone-count{flex:1;text-align:center;padding:5px 6px;border-radius:10px}
.stone-count.p1c{background:rgba(224,120,32,.1);border:1px solid rgba(224,120,32,.4)}
.stone-count.p2c{background:rgba(155,106,181,.1);border:1px solid rgba(155,106,181,.4)}
.stone-num{font-size:24px;font-weight:900}
.stone-lbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.7)}
.sc-pip{border-radius:50%;display:inline-block}
.sc-pip.p1{background:radial-gradient(circle at 35% 35%,#f0922a,#c05e08);border:2px solid #c05e08}
.sc-pip.p2{background:radial-gradient(circle at 35% 35%,#b87fd4,#7a4a94);border:2px solid #7a4a94}
.controls{display:flex;gap:12px;align-items:center;justify-content:center;position:relative;background:transparent;padding:12px 8px 16px;margin-top:auto;margin-bottom:28px;border-top:none;z-index:20;width:100%;box-sizing:border-box;max-width:820px}
.ctrl-btn{padding:14px 28px;font-size:11px;font-weight:700;letter-spacing:1px;border:2px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:Georgia,serif;transition:all .15s;min-height:48px}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn.gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border-color:#d97706}
.ctrl-btn.blue{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.35);color:#93c5fd}
.board-viewport{overflow:visible;position:relative;touch-action:none;border-radius:14px}
.board-inner{position:absolute;transform-origin:0 0;will-change:transform}

</style>

<script>
window.onerror=function(msg,src,line,col,err){
  // "Script error. (line 0)" mit leerem src = Cross-Origin-Fehler von ausserhalb (Safari-intern, Erweiterungen, Teilen-Vorgang).
  // Solche Fehler kann unser Code nicht beheben — wir blenden sie aus, damit sie nicht den Banner triggern.
  if(msg==='Script error.' && !src && line===0){
    return false;
  }
  const app=document.getElementById('app');
  if(app){
    const d=document.createElement('div');
    d.style.cssText='position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;padding:8px;font-size:11px;z-index:999;font-family:monospace';
    d.textContent='JS Error: '+msg+' (line '+line+(src?', '+src.split('/').pop():'')+')';
    document.body.prepend(d);
    setTimeout(()=>d.remove(),8000);
  }
  return false;
};
</script>

function K(x,y){return x+","+y;}
function PK(k){const[x,y]=k.split(",").map(Number);return{x,y};}
function cnt(b,p){return Object.values(b).filter(s=>s&&s.owner===p).length;}
function wordKey(w){return w.dir+w.cells.join("|")+w.word;}

function applyPush(b,m){
  const nb=Object.assign({},b);
  for(const p of m.result.originalPieces)delete nb[K(p.x,p.y)];
  for(const p of m.result.remaining)nb[K(p.x,p.y)]={owner:p.owner,ch:p.ch};

}

function applyJump(b,fx,fy,tx,ty){

// ═══ WORD DETECTION ═══
function computePush(b,px,py,dx,dy,d){
  const pieces=[];let cx=px,cy=py;
  while(cx>=0&&cx<G&&cy>=0&&cy<G){const k=K(cx,cy);if(b[k])pieces.push({x:cx,y:cy,...b[k]});cx+=dx;cy+=dy;}
  if(!pieces.length)return null;
  const np=[{...pieces[0],origX:pieces[0].x,origY:pieces[0].y,x:pieces[0].x+dx*d,y:pieces[0].y+dy*d}];
  for(let i=1;i<pieces.length;i++){
    const prev=np[i-1],orig=pieces[i];let nx=orig.x,ny=orig.y;
    if(dx)nx=dx>0?Math.max(orig.x,prev.x+dx):Math.min(orig.x,prev.x+dx);
    if(dy)ny=dy>0?Math.max(orig.y,prev.y+dy):Math.min(orig.y,prev.y+dy);
    np.push({...orig,origX:orig.x,origY:orig.y,x:nx,y:ny});
  }
  const removed=[],remaining=[];
  for(const p of np)(p.x<0||p.x>=G||p.y<0||p.y>=G?removed:remaining).push(p);
  return{removed,remaining,originalPieces:pieces};
}

function getPushesFrom(b,player,fx,fy){
  const moves=[];
  for(const dir of DIRS){
    for(let d=1;d<G*2;d++){
      const r=computePush(b,fx,fy,dir.dx,dir.dy,d);if(!r)break;
      const oppR=r.removed.filter(p=>p.owner!==player).length;
      const ownR=r.removed.filter(p=>p.owner===player).length;
      if(oppR+ownR>0){// NEUE REGEL: auch eigene Steine dürfen fallen
        const pKeys=new Set(r.originalPieces.map(p=>K(p.x,p.y)));
        let overlap=false;
        for(const p of r.remaining)if(b[K(p.x,p.y)]&&!pKeys.has(K(p.x,p.y))){overlap=true;break;}
        const nx=fx+dir.dx*d,ny=fy+dir.dy*d;
        if(!overlap&&nx>=0&&nx<G&&ny>=0&&ny<G)moves.push({x:fx,y:fy,dir,d,result:r,destX:nx,destY:ny});
      }
      if(fx+dir.dx*d<0||fx+dir.dx*d>=G||fy+dir.dy*d<0||fy+dir.dy*d>=G)break;
    }
  }
  return moves;
}

function getPushMoves(b,player){
  const moves=[];
  for(const k in b){
    if(!b[k]||b[k].owner!==player)continue;
    const{x,y}=PK(k);moves.push(...getPushesFrom(b,player,x,y));
  }
  return moves;
}

function findWordsInLine(cells){
  const words=[];let i=0;
  while(i<cells.length){
    if(!cells[i]){i++;continue;}
    let j=i;while(j<cells.length&&cells[j])j++;
    const seg=cells.slice(i,j);
    if(seg.length>=4){
      const found=[];
      for(let a=0;a<seg.length;a++)for(let b=a+4;b<=seg.length;b++){
        const w=seg.slice(a,b).map(c=>c.ch.toUpperCase()).join("");
        if(WORDS.has(w.toLowerCase()))found.push({word:w,start:i+a,end:i+b-1});
      }
      // Include ALL valid words (including subwords) so they appear in beforeWords
      // This prevents subwords of longer words from being counted as "new" after a push
      for(const w of found)words.push(w);
    }
    i=j;
  }
  return words;
}

function findAllWords(b){
  const all=[];
  for(let y=0;y<G;y++){
    const row=[];for(let x=0;x<G;x++)row.push(b[K(x,y)]||null);
    const ws=findWordsInLine(row);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(i,y));w.dir="row";});
    all.push(...ws);
  }
  for(let x=0;x<G;x++){
    const col=[];for(let y=0;y<G;y++)col.push(b[K(x,y)]||null);
    const ws=findWordsInLine(col);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(x,i));w.dir="col";});
    all.push(...ws);
  }
  // O(n) dedup über Set
  const seen=new Set();
  const result=[];
  for(const w of all){
    const key=w.cells.join("|")+w.word;
    if(seen.has(key))continue;
    seen.add(key);
    result.push(w);
  }
  return result;
}

function getNewWords(before,after){
  if(!before||!after)return[];
  const bKeys=new Set(before.map(wordKey));
  const newW=after.filter(w=>!bKeys.has(wordKey(w)));
  if(!newW.length)return[];
  // Per line: keep ALL words tied for longest (not just one)
  const byLine=new Map();
  for(const w of newW){
    const lk=w.dir==="row"?"row-"+w.cells[0].split(",")[1]:"col-"+w.cells[0].split(",")[0];
    if(!byLine.has(lk)){
      byLine.set(lk,[w]);
    } else {
      const arr=byLine.get(lk);
      if(w.word.length>arr[0].word.length) byLine.set(lk,[w]);
      else if(w.word.length===arr[0].word.length) arr.push(w);
    }
  }
  // Flatten, find global max, return tied for max
  const allWinners=[...byLine.values()].flat();
  const max=Math.max(...allWinners.map(w=>w.word.length));
  return allWinners.filter(w=>w.word.length===max);
}

// ═══ STONE RETURN ═══
function kiScore(myCount,oppCount,eliminated,stonesBack,longestWord,oppAfter,isJump){
  // Level-specific weights
  // Nice:  elim-heavy, weak word bonus → plays like a casual human
  // Great: balanced → forces human to also think about words
  // Sharp: word-heavy, elim secondary → always maximizes language potential
  const elimW=  kiLevel===1?12 : kiLevel===2?10 : 10;
  const backW=  kiLevel===1?8  : kiLevel===2?12 : 18;
  const wrdW4=  kiLevel===1?40 : kiLevel===2?30 : 80;// flat bonus: word exists (4+) — raised for Sharp to ensure word moves always preferred
  const endW3=  kiLevel===1?150: kiLevel===2?300: 400;
  const endW6=  kiLevel===1?20 : kiLevel===2?60 : 80;
  const endW10= kiLevel===1?5  : kiLevel===2?20 : 30;

  let sc=eliminated*elimW;
  if(oppAfter<=3)sc+=endW3;else if(oppAfter<=6)sc+=endW6;else if(oppAfter<=10)sc+=endW10;
  if(stonesBack>0){
    sc+=stonesBack*backW;
    if(myCount+oppCount>30)sc+=stonesBack*(kiLevel===3?14:8);
    else if(myCount+oppCount>20)sc+=stonesBack*(kiLevel===3?10:5);
    if(myCount<=10)sc+=stonesBack*(kiLevel===3?20:10);
    if(myCount<=6)sc+=stonesBack*(kiLevel===3?35:20);
    if(longestWord>=4)sc+=wrdW4;// flat bonus: word exists
  }
  // Heavy penalty for "word formed but no opponent kill" — mathematically a loss-only move
  // (own stone sacrificed, no reward since reward = opponent kills). Applies to all levels.
  if(longestWord>=4 && eliminated===0) sc -= 200;
  // Nice: occasional random move to feel human
  const noise=kiLevel===1?Math.random()*18-6 : kiLevel===2?Math.random()*8 : Math.random()*0.5;
  sc+=noise;
  return sc;
}

// Evaluate moves for a player on board b, return sorted list of {move,score,board}
function oppDangerScore(nb,opp,bSet){
  // Returns 4 if opponent could form ANY new word with their next push, 0 otherwise.
  // Callers only check >=4 — word length is irrelevant. Early-return makes this fast on dense boards.
  const oppPushes=getPushMoves(nb,opp);
  for(const p of oppPushes){
    const nb2=applyPush(nb,p);
    const nw=findAllWords(nb2).filter(w=>!bSet.has(wordKey(w)));
    if(nw.length>0)return 4;
  }
  return 0;
}

// Returns max stones the opponent could remove with their best push (used for exposure penalty in self-defense).
function oppMaxKills(nb,opp){
  const pushes=getPushMoves(nb,opp);
  let max=0;
  for(const p of pushes){
    const k=p.result.removed.filter(x=>x.owner!==opp).length;
    if(k>max)max=k;
  }
  return max;
}

// Self-defense composite scoring — used by all three levels when bot has <=14 stones.
// Penalizes moves that leave bot stones exposed in rows/columns where a single push could fell many.
function kiSelfDefense(b,player,opp,bSet,humanKills){
  const allM=evalMoves(b,player,bSet,20);
  if(!allM.length)return null;
  const myC=cnt(b,player),oppC=cnt(b,opp);
  const bothLow=myC<=12&&oppC<=12;
  const killW=bothLow?40:30;
  const wordW=bothLow?10:15;
  const retW=35;
  const expW=bothLow?20:18;
  const hk=humanKills||0;
  const scored=allM.map(m=>{
    const kills=m.move.result.removed.filter(x=>x.owner!==player).length;
    const ownLost=m.move.result.removed.filter(x=>x.owner===player).length;
    const hasWord=m.move.word?1:0;
    const returns=hasWord?kills:0;
    const exposure=oppMaxKills(m.board,opp);
    const netKills=kills-ownLost;
    const kadenz=hk>=2?(kills>=hk?30:-25):0;
    // Malus für Wort ohne Kill: mathematisch ein Selbstopfer ohne Gegenwert
    const wordButNoKill = hasWord && kills === 0;
    const sdScore=returns*retW+hasWord*wordW+netKills*killW-exposure*expW+kadenz - (wordButNoKill ? 500 : 0);
    return {m,sdScore};
  });
  scored.sort((a,b)=>b.sdScore-a.sdScore);
  return scored[0].m.move;
}

function pickBoard(){
  if(_usedBoardIndices.length>=BOARD_POOL.length)_usedBoardIndices=[];
  const avail=BOARD_POOL.map((_,i)=>i).filter(i=>!_usedBoardIndices.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  _usedBoardIndices.push(idx);_currentBoardIndex=idx+1;return BOARD_POOL[idx];
}


function renderMiniBoard(board, humanPlayer, hiddenWord) {
  if(!board) return '';
  const cs=20,g=2,sz=7;
  // Find word cells AND its direction (row=green, col=blue, like in main board)
  const wordCellsRow=new Set(), wordCellsCol=new Set();
  try {
    const aw=findAllWords(board);
    for(const w of aw) if(w.word===hiddenWord){
      const target=w.dir==="row"?wordCellsRow:wordCellsCol;
      for(const c of w.cells) target.add(c);
    }
  } catch(e){}
  let h='<div style="display:inline-grid;grid-template-columns:repeat('+sz+','+cs+'px);gap:'+g+'px;background:rgba(0,0,0,.3);padding:4px;border-radius:6px">';
  for(let y=0;y<sz;y++) for(let x=0;x<sz;x++){
    const k=K(x,y);const tile=board[k];
    const inRow=wordCellsRow.has(k), inCol=wordCellsCol.has(k);
    if(tile){
      const col=tile.owner===humanPlayer?'#e07820':'#9b6ab5';
      const brd=inRow?';outline:2px solid #4caf50':inCol?';outline:2px solid #42a5f5':'';
      h+='<div style="width:'+cs+'px;height:'+cs+'px;border-radius:3px;background:'+col+brd+';display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff">'+tile.ch+'</div>';
    } else {
      h+='<div style="width:'+cs+'px;height:'+cs+'px;border-radius:3px;background:rgba(255,255,255,.05)"></div>';
    }
  }
  return h+'</div>';
}

let _mlCacheBoard=null,_mlCacheVal=null;// Cache: gleiche Stellung nicht mehrfach durchrechnen (Sofort-Pfad + Analyse)
function _missedWordList(preBoard, player){
  if(preBoard===_mlCacheBoard&&_mlCacheVal)return _mlCacheVal;
  try{
    const wl=(typeof WORDS!=='undefined')?WORDS:undefined;
    const bw=findAllWords(preBoard,wl);
    const meta={};// je Wort: bester Zug (max. gegnerische Kills, dann min. Eigenverlust)
    for(const p of getPushMoves(preBoard,player)){
      let nb; try{ nb=applyPush(preBoard,p); }catch(e){ continue; }
      const _rm=(p.result&&p.result.removed)?p.result.removed:[];
      const oppK=_rm.filter(r=>r.owner!==player).length;
      const ownL=_rm.filter(r=>r.owner===player).length;
      for(const w of getNewWords(bw,findAllWords(nb,wl))){
        const s=w.word;
        if(!s||s.length<4)continue;
        const ex=meta[s];
        if(!ex||(oppK-ownL)>(ex.k-ex.l)||((oppK-ownL)===(ex.k-ex.l)&&oppK>ex.k)) meta[s]={k:oppK,l:ownL,board:nb};
      }
    }
    const out=Object.keys(meta).sort((a,b)=>(meta[b].k-meta[b].l)-(meta[a].k-meta[a].l)||meta[b].k-meta[a].k||b.length-a.length||a.localeCompare(b));
    const res={count:out.length, words:out,
      bestBoard:out.length?meta[out[0]].board:null,
      bestKills:out.length?meta[out[0]].k:0,
      bestLoss:out.length?meta[out[0]].l:0};
    _mlCacheBoard=preBoard;_mlCacheVal=res;
    return res;
  }catch(e){ return {count:0, words:[], bestBoard:null, bestKills:0, bestLoss:0}; }
}

// ═══ PUSH MECHANICS ═══
function computePush(b,px,py,dx,dy,d){
  const pieces=[];let cx=px,cy=py;
  while(cx>=0&&cx<G&&cy>=0&&cy<G){const k=K(cx,cy);if(b[k])pieces.push({x:cx,y:cy,...b[k]});cx+=dx;cy+=dy;}
  if(!pieces.length)return null;
  const np=[{...pieces[0],origX:pieces[0].x,origY:pieces[0].y,x:pieces[0].x+dx*d,y:pieces[0].y+dy*d}];
  for(let i=1;i<pieces.length;i++){
    const prev=np[i-1],orig=pieces[i];let nx=orig.x,ny=orig.y;
    if(dx)nx=dx>0?Math.max(orig.x,prev.x+dx):Math.min(orig.x,prev.x+dx);
    if(dy)ny=dy>0?Math.max(orig.y,prev.y+dy):Math.min(orig.y,prev.y+dy);
    np.push({...orig,origX:orig.x,origY:orig.y,x:nx,y:ny});
  }
  const removed=[],remaining=[];
  for(const p of np)(p.x<0||p.x>=G||p.y<0||p.y>=G?removed:remaining).push(p);
  return{removed,remaining,originalPieces:pieces};
}

function getPushesFrom(b,player,fx,fy){
  const moves=[];
  for(const dir of DIRS){
    for(let d=1;d<G*2;d++){
      const r=computePush(b,fx,fy,dir.dx,dir.dy,d);if(!r)break;
      const oppR=r.removed.filter(p=>p.owner!==player).length;
      const ownR=r.removed.filter(p=>p.owner===player).length;
      if(oppR+ownR>0){// NEUE REGEL: auch eigene Steine dürfen fallen
        const pKeys=new Set(r.originalPieces.map(p=>K(p.x,p.y)));
        let overlap=false;
        for(const p of r.remaining)if(b[K(p.x,p.y)]&&!pKeys.has(K(p.x,p.y))){overlap=true;break;}
        const nx=fx+dir.dx*d,ny=fy+dir.dy*d;
        if(!overlap&&nx>=0&&nx<G&&ny>=0&&ny<G)moves.push({x:fx,y:fy,dir,d,result:r,destX:nx,destY:ny});
      }
      if(fx+dir.dx*d<0||fx+dir.dx*d>=G||fy+dir.dy*d<0||fy+dir.dy*d>=G)break;
    }
  }
  return moves;
}

function getPushMoves(b,player){
  const moves=[];
  for(const k in b){
    if(!b[k]||b[k].owner!==player)continue;
    const{x,y}=PK(k);moves.push(...getPushesFrom(b,player,x,y));
  }
  return moves;
}

function applyPush(b,m){
  const nb=Object.assign({},b);
  for(const p of m.result.originalPieces)delete nb[K(p.x,p.y)];
  for(const p of m.result.remaining)nb[K(p.x,p.y)]={owner:p.owner,ch:p.ch};
  return nb;
}

function applyJump(b,fx,fy,tx,ty){
  const nb=Object.assign({},b);const t=nb[K(fx,fy)];delete nb[K(fx,fy)];nb[K(tx,ty)]=t;return nb;
}

// ═══ WORD DETECTION ═══
function findWordsInLine(cells,dict){
  dict=dict||WORDS;
  const words=[];let i=0;
  while(i<cells.length){
    if(!cells[i]){i++;continue;}
    let j=i;while(j<cells.length&&cells[j])j++;
    const seg=cells.slice(i,j);
    if(seg.length>=4){
      const found=[];
      for(let a=0;a<seg.length;a++)for(let b=a+4;b<=seg.length;b++){
        const w=seg.slice(a,b).map(c=>c.ch.toUpperCase()).join("");
        if(dict.has(w.toLowerCase()))found.push({word:w,start:i+a,end:i+b-1});
      }
      // Include ALL valid words (including subwords) so they appear in beforeWords
      // This prevents subwords of longer words from being counted as "new" after a push
      for(const w of found)words.push(w);
    }
    i=j;
  }
  return words;
}

function findAllWords(b,dict){
  const all=[];
  for(let y=0;y<G;y++){
    const row=[];for(let x=0;x<G;x++)row.push(b[K(x,y)]||null);
    const ws=findWordsInLine(row,dict);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(i,y));w.dir="row";});
    all.push(...ws);
  }
  for(let x=0;x<G;x++){
    const col=[];for(let y=0;y<G;y++)col.push(b[K(x,y)]||null);
    const ws=findWordsInLine(col,dict);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(x,i));w.dir="col";});
    all.push(...ws);
  }
  // O(n) dedup über Set
  const seen=new Set();
  const result=[];
  for(const w of all){
    const key=w.cells.join("|")+w.word;
    if(seen.has(key))continue;
    seen.add(key);
    result.push(w);
  }
  return result;
}

function wordKey(w){return w.dir+w.cells.join("|")+w.word;}

function getNewWords(before,after){
  if(!before||!after)return[];
  const bKeys=new Set(before.map(wordKey));
  const newW=after.filter(w=>!bKeys.has(wordKey(w)));
  if(!newW.length)return[];
  // Per line: keep ALL words tied for longest (not just one)
  const byLine=new Map();
  for(const w of newW){
    const lk=w.dir==="row"?"row-"+w.cells[0].split(",")[1]:"col-"+w.cells[0].split(",")[0];
    if(!byLine.has(lk)){
      byLine.set(lk,[w]);
    } else {
      const arr=byLine.get(lk);
      if(w.word.length>arr[0].word.length) byLine.set(lk,[w]);
      else if(w.word.length===arr[0].word.length) arr.push(w);
    }
  }
  // Flatten, find global max, return tied for max
  const allWinners=[...byLine.values()].flat();
  const max=Math.max(...allWinners.map(w=>w.word.length));
  return allWinners.filter(w=>w.word.length===max);
}

// ═══ STONE RETURN ═══

function findSmartReturnSlots(player, count, empty) {
  const ALPHA = "ABCDEFGHIKLMNOPRSTUW";
  const ENDGAME_LETTERS = "EASTRNL";
  const slots = [];
  if(empty.length===0||count===0) return slots;

  // The opponent is who we want to enable word-building for
  const opponent = player===P1?P2:P1;

  // Count total stones on board
  const totalStones = Object.values(board).filter(t=>t).length;
  const endgame = totalStones <= 14;

  // Endgame: prefer cells adjacent to existing stones
  let searchCells = empty;
  if(endgame){
    const adj=new Set();
    for(const k in board){
      if(!board[k])continue;
      const{x,y}=PK(k);
      for(const dir of [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}]){
        const nx=x+dir.dx,ny=y+dir.dy;
        if(nx>=0&&nx<G&&ny>=0&&ny<G&&!board[K(nx,ny)]) adj.add(K(nx,ny));
      }
    }
    const adjCells=empty.filter(e=>adj.has(e.k));
    if(adjCells.length>0) searchCells=adjCells;
  }

  const letters = endgame ? ENDGAME_LETTERS.split("") : ALPHA.split("");
  for(let i=searchCells.length-1;i>0;i--){const j=0|Math.random()*(i+1);[searchCells[i],searchCells[j]]=[searchCells[j],searchCells[i]];}
  for(let i=letters.length-1;i>0;i--){const j=0|Math.random()*(i+1);[letters[i],letters[j]]=[letters[j],letters[i]];}

  let keySlot=null;

  // Pass 1: push only — check opponent moves
  outer1:
  for(const {k,x,y} of searchCells){
    for(const ch of letters){
      board[k]={owner:player,ch};
      const bw=findAllWords(board);
      for(const p of getPushMoves(board,opponent)){
        const _pb1=applyPush(board,p);
        const nw=getNewWords(bw,findAllWords(_pb1));
        if(nw.length>0){
          const w=nw.reduce((a,b)=>b.word.length>a.word.length?b:a,nw[0]);
          delete board[k];keySlot={k,x,y,ch,word:w.word,wordBoard:JSON.parse(JSON.stringify(_pb1))};break outer1;}
      }
      delete board[k];
    }
  }

  // Pass 2: jump+push — check opponent moves
  if(!keySlot){
    const oppTiles=[];
    for(const tk in board) if(board[tk]&&board[tk].owner===opponent) oppTiles.push(PK(tk));
    outer2:
    for(const {k,x,y} of searchCells){
      for(const ch of letters){
        board[k]={owner:player,ch};
        const bw=findAllWords(board);
        const empties2=empty.filter(e=>e.k!==k);
        for(const t of oppTiles){
          for(const jt of empties2.slice(0,6)){
            const bj=applyJump(board,t.x,t.y,jt.x,jt.y);
            const bjW=findAllWords(bj);
            for(const p of getPushesFrom(bj,opponent,jt.x,jt.y)){
              const _pb2=applyPush(bj,p);
              const nw=getNewWords(bjW,findAllWords(_pb2));
              if(nw.length>0){
                const w=nw.reduce((a,b)=>b.word.length>a.word.length?b:a,nw[0]);
                delete board[k];keySlot={k,x,y,ch,word:w.word,wordBoard:JSON.parse(JSON.stringify(_pb2))};break outer2;
              }
            }
          }
        }
        delete board[k];
      }
    }
  }

  // Build result
  const used=new Set();
  if(keySlot){
    slots.push(keySlot);used.add(keySlot.k);
    _hiddenWord=keySlot.word||null;
    // Save the board AFTER the push where word appears
    _hiddenBoard=keySlot.wordBoard||null;
  } else{_hiddenWord=null;_hiddenBoard=null;}
  const remaining=empty.filter(e=>!used.has(e.k));
  // Sichere Platzierung: meide Abgrund-Randzellen und Selbstfallen-Felder.
  // Gefährdung(k) = max. eigene Steine, die ein Gegnerschub fegen könnte, läge hier ein Stein.
  // remaining ist bereits gemischt → stabile Sortierung hält den Zufall innerhalb gleicher Gefährdung.
  const _exposure=(k)=>{
    board[k]={owner:player,ch:"A"};
    let mx=0;
    for(const p of getPushMoves(board,opponent)){
      let own=0;
      for(const r of p.result.removed) if(r.owner===player) own++;
      if(own>mx)mx=own;
      if(mx>=4)break;
    }
    delete board[k];
    return mx;
  };
  const _scored=remaining.map(e=>({e,risk:_exposure(e.k)}));
  _scored.sort((a,b)=>a.risk-b.risk);
  for(const {e} of _scored.slice(0,count-slots.length)){
    slots.push({k:e.k,x:e.x,y:e.y,ch:ALPHA[Math.floor(Math.random()*ALPHA.length)]});
  }
  return slots;
}
function returnStonesAnimated(player,count,onDone,forbiddenKeys){
  _stonesReturning=true;
  const forbidden=new Set(forbiddenKeys||[]);
  // Spielregel: Es kommen GENAU SO VIELE Steine zurück wie gegnerische Steine eliminiert wurden.
  // Strategie: erst nur erlaubte Zellen (Wort-Reihe gesperrt); falls nicht genug, schrittweise lockern.
  let empty=[];
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    const k=K(x,y);if(!board[k]&&!forbidden.has(k))empty.push({k,x,y});
  }
  // Lockerung 1: wenn forbidden zu eng — verbotene Zellen wieder aufnehmen
  if(empty.length<count){
    const usedKeys=new Set(empty.map(e=>e.k));
    for(let y=0;y<G;y++)for(let x=0;x<G;x++){
      const k=K(x,y);if(!board[k]&&!usedKeys.has(k))empty.push({k,x,y});
    }
  }
  for(let i=empty.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[empty[i],empty[j]]=[empty[j],empty[i]];}
  // Nach Lockerung ist immer genug Platz da: 49 Felder − belegte ≥ Kills + Push-Origin.
  const actual=count;
  if(actual===0){_stonesReturning=false;if(onDone)setTimeout(()=>onDone(0),400);return 0;}
  _returnTimers.forEach(t=>clearTimeout(t));_returnTimers=[];
  const _smartSlots=findSmartReturnSlots(player,actual,empty);
  // Shuffle so key stone position is unpredictable
  for(let i=_smartSlots.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[_smartSlots[i],_smartSlots[j]]=[_smartSlots[j],_smartSlots[i]];}
  for(let i=0;i<actual;i++){
    const _slot=_smartSlots[i]||empty[i];
    const{k,x,y}=_slot;
    const _slotCh=_slot.ch;
    _returnTimers.push(setTimeout(()=>{
      if(!_stonesReturning)return;
      board[k]={owner:player,ch:_slotCh};
      returnedKeys=new Set([k]);render();
      if(window.SHOVEAUDIO) window.SHOVEAUDIO.playReturn(i);
      _returnTimers.push(setTimeout(()=>{returnedKeys.delete(k);},1700));
      if(i===actual-1)_returnTimers.push(setTimeout(()=>{
        returnedKeys=new Set();_stonesReturning=false;
        if(onDone)onDone(actual);
      },1200));
    },i*600+400));
  }
  return actual;
}

function animateWordBirth(newWords,onDone){
  if(!newWords||newWords.length===0){if(onDone)onDone();return;}
  const maxLen=Math.max(...newWords.map(w=>w.word.length));
  const w=newWords.find(x=>x.word.length===maxLen)||newWords[0];

  // Phase 1: letters pulse on board sequentially
  const be=document.querySelector(".board");

    const bSet2=new Set(findAllWords(boardAfterBot).map(wordKey));
    // Ply 2: opponent 8 responses
    const oppMoves=evalMoves(boardAfterBot,opp,bSet2,8);
    if(!oppMoves.length){
      if(cand.score>bestNet){bestNet=cand.score;bestMove=cand.move;}
      continue;
    }
    oppMoves.sort((a,c)=>c.score-a.score);
    const oppCandidates=oppMoves.slice(0,Math.min(8,oppMoves.length));
    // Opponent picks best considering my ply-3 counter
    let oppWorstForMe=-999999;
    for(const oppCand of oppCandidates){
      const boardAfterOpp=oppCand.board;
      const bSet3=new Set(findAllWords(boardAfterOpp).map(wordKey));
      // Ply 3: my best counter (top 6)
      const myCounters=evalMoves(boardAfterOpp,player,bSet3,6);
      const myCounterBest=myCounters.length>0
        ?myCounters.reduce((a,c)=>c.score>a.score?c:a,myCounters[0]).score:0;
      // Opponent's net: their gain minus my counter
      const oppNet=oppCand.score - myCounterBest*0.6;
      if(oppNet>oppWorstForMe)oppWorstForMe=oppNet;
    }
    // My net: my gain minus opponent's best net response
    const net=cand.score - oppWorstForMe*0.75;
    if(net>bestNet){bestNet=net;bestMove=cand.move;}
  }
  return bestMove||candidates[0].move;
}

  // Arrows
  if(simPhase==="pushing"&&!gameEnding&&turn===humanPlayer&&origin&&(hPhase==="selected"||hPhase==="jumped")){
    const bpx=G*(CELL+GAP);
    // Show 6 positions direction — gold if valid (eliminates stone), grey if not
    // Build index of valid pushes for onclick lookup
    const validPushMap=new Map();
    pushes.forEach((p,i)=>{const key=p.dir.n+p.d;validPushMap.set(key,{p,i});});
    for(const dir of DIRS){

function onPlay(){
  if(_stonesReturning)return;
  if(hPhase==="placing"){
    if(hRetPending.length>0){setReturnComment();render();return;}
    hPhase="idle";hRetSel=null;
    gameStats[humanPlayer===P1?'p1ret':'p2ret']+=hRetPlaced.length;
    for(const p of hRetPlaced)returnedKeys.delete(p.k);hRetPlaced=[];
    activeWordBoxes=[];wordHLMap={};lastCompleted="human";
    turn=aiPlayer;if(!checkGameEnd())setTimeout(()=>humanAITurn(),600);
    render();return;
  }
  if(simPhase==="ki-decided"){
    startGame();render();
    if(turn===humanPlayer)setTimeout(()=>startHumanTurn(),1000);
    else setTimeout(()=>humanAITurn(),600);
    return;
  }
  if(pendingNextTurn){
    if(_wordOverlay){_wordOverlay.remove();_wordOverlay=null;}
    const fn=pendingNextTurn;pendingNextTurn=null;wordHLMap={};// word-box DOM survives
    fn();
    return;
  }
}


let _onBackLock=false;
function onBack(){
  if(_onBackLock)return;
  _onBackLock=true;setTimeout(()=>{_onBackLock=false;},600);
  if(hPhase==="placing"){
    if(hRetPlaced.length>0){const last=hRetPlaced.pop();delete board[last.k];returnedKeys.delete(last.k);hRetPending.push(last.ch);hRetSel=null;setReturnComment();render();return;}
    // nichts (mehr) gesetzt → ganzen Zug verwerfen, damit man einen anderen Zug überlegen kann
    hRetPending=[];hRetSel=null;lastCompleted="human";
    // kein return: unten folgt die normale Wiederherstellung auf snapHuman (Zuganfang)
  }
  // ZURÜCK invalidiert alle laufenden Timeouts aus dem aktuellen Bot-Zug
  // (z.B. 2.5s-Pause vor startHumanTurn → würde sonst kurz "Dein Zug." anzeigen)
  _botSeq++;
  // Decide which snap to use:
  // - Human mid-turn (selected or jumped) → restore start of human turn
  // - Otherwise → restore start of bot's last turn
  // Always prefer snapHuman (start of human's last turn) — fallback to snapBot
  // If human hasn't started yet (no stone selected) → go back to before bot's turn
  const humanAtTurnStart=(turn===humanPlayer&&(hPhase==="select"||hPhase==="idle")&&!pendingNextTurn);
  const lastCompletedWasBot=humanAtTurnStart||(lastCompleted==="bot");
  const snap=lastCompletedWasBot?snapBot:(snapHuman||snapBot);
  if(!snap)return;
  // Cancel everything in flight
  _stonesReturning=false;_sliding=false;_breathing=false;
  botTurnPhase=0;botReturnSnap=null;
  if(_birthTimer){clearTimeout(_birthTimer);_birthTimer=null;}
  if(_slideTimer){clearTimeout(_slideTimer);_slideTimer=null;}
  _returnTimers.forEach(t=>clearTimeout(t));_returnTimers=[];
  wordBoxKills=0;wordBoxBadgeShown=false;
  if(timer){clearTimeout(timer);timer=null;}
  // Cancel any pending worker callback — its `best` is computed on a stale board snapshot
  if(_aiWorker)_aiWorker.onmessage=null;
  pendingNextTurn=null;
  if(_wordOverlay){_wordOverlay.remove();_wordOverlay=null;}
  const wz=document.getElementById("wordZoneMob");if(wz)wz.innerHTML="";
  wordHLMap={};returnedKeys=new Set();
  restoreSnap(JSON.parse(snap));
  // Sofort den alten Kommentar überschreiben, damit kein Flackern entsteht
  // wenn ZURÜCK auf einen Bot-Zug erfolgt (sonst sieht man kurz den alten Spieler-Kommentar)
  if(lastCompletedWasBot){comment=botThinkingMsg();commentCls="ai";}
  kiSelPos=null;kiWordHL={};returnedKeys=new Set();
  wordHLMap={};activeWordBoxes=[];wordBoxCells=new Set();activeWordKeys=new Set();wordBoxKills=0;wordBoxBadgeShown=false;botTurnPhase=0;botReturnSnap=null;
  hSel=null;hDest=null;hJumpDone=false;
  snapHuman=null;if(lastCompletedWasBot)snapBot=null;backAvailable=false;lastCompleted=null;
  if(lastCompletedWasBot){
    turn=aiPlayer;
    render();
    timer=setTimeout(()=>humanAITurn(),1500);
  } else {
    turn=humanPlayer;
    startHumanTurn();// sets snapHuman + hPhase + render
  }
}

// ── BUCHSTABENMEER HINTERGRUND ──
// Primary: OffscreenCanvas in Worker (smooth regardless of main-thread load)
// Fallback: Main-thread rAF loop (iOS < 16.4, older browsers)
(function(){
  const cv=document.getElementById('seaCanvas');
  if(!cv)return;
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ';

  // Feature-detect: OffscreenCanvas + transferControlToOffscreen
  const canUseOffscreen = typeof cv.transferControlToOffscreen === 'function'
                       && typeof Worker !== 'undefined'
                       && typeof OffscreenCanvas !== 'undefined';

  if(canUseOffscreen){
    try{
      const workerCode = `
        const CHARS='${CHARS}';
        let drops=[],cv,cx,paused=false;
        function mkDrop(w,h){
          const isCyan=Math.random()<.7;
          const col=isCyan
            ?'rgba('+(40+Math.random()*50|0)+','+(160+Math.random()*80|0)+','+(190+Math.random()*65|0)+',1)'
            :'rgba('+(190+Math.random()*65|0)+','+(100+Math.random()*60|0)+','+(20+Math.random()*30|0)+',1)';
          return{ch:CHARS[Math.floor(Math.random()*CHARS.length)],
            x:Math.random()*w,y:Math.random()*h,
            sz:10+Math.random()*38,op:0.04+Math.random()*0.18,
            vx:(Math.random()-.5)*.22,vy:-.02-.09*Math.random(),
            r:(Math.random()-.5)*.45,vr:(Math.random()-.5)*.001,col};
        }
        function drawSea(){
          if(!cv||!cx)return;
          cx.clearRect(0,0,cv.width,cv.height);
          for(const d of drops){
            cx.save();cx.translate(d.x,d.y);cx.rotate(d.r);
            cx.globalAlpha=Math.max(0,d.op);
            cx.font='900 '+d.sz+'px "Libre Franklin","Georgia",serif';
            cx.fillStyle=d.col;
            cx.fillText(d.ch,0,0);
            cx.restore();
            d.x+=d.vx;d.y+=d.vy;d.r+=d.vr;
            if(d.y<-60){d.y=cv.height+20;d.x=Math.random()*cv.width}
            if(d.x<-60)d.x=cv.width+20;
            if(d.x>cv.width+60)d.x=-20;
          }
          if(!paused)requestAnimationFrame(drawSea);
        }
        self.onmessage=function(e){
          if(e.data.type==='init'){
            cv=e.data.canvas;cx=cv.getContext('2d');
            cv.width=e.data.w;cv.height=e.data.h;
            drops=[];for(let i=0;i<80;i++)drops.push(mkDrop(cv.width,cv.height));
            drawSea();
          }else if(e.data.type==='resize'){
            cv.width=e.data.w;cv.height=e.data.h;
          }else if(e.data.type==='pause'){paused=true;
          }else if(e.data.type==='resume'){if(paused){paused=false;drawSea();}}
        };
      `;
      const blob=new Blob([workerCode],{type:'application/javascript'});
      const worker=new Worker(URL.createObjectURL(blob));
      const off=cv.transferControlToOffscreen();
      worker.postMessage({type:'init',canvas:off,w:innerWidth,h:innerHeight},[off]);
      window.addEventListener('resize',()=>{
        worker.postMessage({type:'resize',w:innerWidth,h:innerHeight});
      });
      document.addEventListener('visibilitychange',()=>{
        worker.postMessage({type:document.hidden?'pause':'resume'});
      });
      return;// success — skip fallback
    }catch(err){/* fall through to main-thread version */}
  }

  // ── FALLBACK: main-thread rAF loop (unchanged from original) ──
  const cx=cv.getContext('2d');
  let drops=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  function mkDrop(){
    const isCyan=Math.random()<.7;
    const col=isCyan
      ?`rgba(${40+Math.random()*50|0},${160+Math.random()*80|0},${190+Math.random()*65|0},1)`
      :`rgba(${190+Math.random()*65|0},${100+Math.random()*60|0},${20+Math.random()*30|0},1)`;
    return{
      ch:CHARS[Math.floor(Math.random()*CHARS.length)],
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight,
      sz:10+Math.random()*38,
      op:0.04+Math.random()*0.18,
      vx:(Math.random()-.5)*.22,
      vy:-.02-.09*Math.random(),
      r:(Math.random()-.5)*.45,
      vr:(Math.random()-.5)*.001,
      col
    };
  }
  for(let i=0;i<80;i++)drops.push(mkDrop());
  let _seaPaused=false;
  function drawSea(){
    cx.clearRect(0,0,cv.width,cv.height);
    for(const d of drops){
      cx.save();cx.translate(d.x,d.y);cx.rotate(d.r);
      cx.globalAlpha=Math.max(0,d.op);
      cx.font=`900 ${d.sz}px 'Libre Franklin','Georgia',serif`;
      cx.fillStyle=d.col;
      cx.fillText(d.ch,0,0);
      cx.restore();
      d.x+=d.vx;d.y+=d.vy;d.r+=d.vr;
      if(d.y<-60){d.y=cv.height+20;d.x=Math.random()*cv.width}
      if(d.x<-60)d.x=cv.width+20;
      if(d.x>cv.width+60)d.x=-20;
    }
    if(!_seaPaused)requestAnimationFrame(drawSea);
  }
  drawSea();
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){_seaPaused=true;}
    else if(_seaPaused){_seaPaused=false;requestAnimationFrame(drawSea);}
  });
})();

// =========================================================================
// SHOVE KLANGWELT — Web Audio Score
// Meer (Jóhannsson-Drone) + Wellen (Richter-Akkorde)
// Word-Sound: aufsteigende Glocke (Belohnung)
// Fall-Sound: absteigende Spiegel-Phrase, proportional zur Anzahl
// =========================================================================
(function(){
  const STATE = {
    ctx: null,
    meerGain: null, welleGain: null,
    on: false, endgame: false,
    meerVoices: [], welleVoices: [],
    meerTimer: null, welleTimer: null,
    meerIdx: 0, welleIdx: 0,
    meerPlaying: false, wellePlaying: false,
  };
  
  const MEER_CLUSTERS = [
    [49, 52, 55, 58], [44, 49, 52, 58], [55, 58, 62, 65], [41, 44, 49, 55],
  ];
  const WELLE_CHORDS = [
    { name:'Dm',  notes:[146.83, 174.61, 220.00], duration:10 },
    { name:'F',   notes:[174.61, 220.00, 261.63], duration:10 },
    { name:'B♭',  notes:[116.54, 146.83, 174.61], duration:10 },
    { name:'A',   notes:[110.00, 138.59, 164.81], duration:10 },
  ];
  
  // Word/Fall tone scales — mirrored
  const ASCENT  = [330, 440, 660, 880];   // Word: hell, aufsteigend
  const DESCENT = [880, 660, 440, 330];   // Fall: spiegel, dunkler gefärbt
  
  async function ensureCtx(){
    if(!STATE.ctx){
      try{ STATE.ctx = new (window.AudioContext||window.webkitAudioContext)(); }
      catch(e){ return false; }
      // iOS unlock
      try{
        const b = STATE.ctx.createBuffer(1,1,22050);
        const s = STATE.ctx.createBufferSource();
        s.buffer = b; s.connect(STATE.ctx.destination); s.start(0);
      }catch(e){}
    }
    if(STATE.ctx.state==='suspended'){
      try{ await STATE.ctx.resume(); }catch(e){}
    }
    return true;
  }
  
  function makeReverb(duration, decay){
    const sr = STATE.ctx.sampleRate;
    const length = Math.floor(sr*duration);
    const impulse = STATE.ctx.createBuffer(2, length, sr);
    for(let ch=0; ch<2; ch++){
      const data = impulse.getChannelData(ch);
      for(let i=0; i<length; i++){
        data[i] = (Math.random()*2-1) * Math.pow(1-i/length, decay);
      }
    }
    return impulse;
  }
  
  function setupChains(){
    if(STATE.meerGain) return;
    const ctx = STATE.ctx;
    
    STATE.meerGain = ctx.createGain();
    STATE.meerGain.gain.value = 0.3;
    const mConv = ctx.createConvolver();
    mConv.buffer = makeReverb(7.0, 1.3);
    const mRev = ctx.createGain();
    mRev.gain.value = 0.7;
    STATE.meerGain.connect(ctx.destination);
    STATE.meerGain.connect(mRev);
    mRev.connect(mConv);
    mConv.connect(ctx.destination);
    
    STATE.welleGain = ctx.createGain();
    STATE.welleGain.gain.value = 0.42;
    const wConv = ctx.createConvolver();
    wConv.buffer = makeReverb(5.0, 2.0);
    const wRev = ctx.createGain();
    wRev.gain.value = 0.4;
    STATE.welleGain.connect(ctx.destination);
    STATE.welleGain.connect(wRev);
    wRev.connect(wConv);
    wConv.connect(ctx.destination);
  }
  
  function meerVoice(freq, gainVal, attack){
    const ctx = STATE.ctx;
    const g = ctx.createGain(); g.gain.value=0; g.connect(STATE.meerGain);
    const osc = ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08+Math.random()*0.12;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 5+Math.random()*8;
    lfo.connect(lfoGain); lfoGain.connect(osc.detune);
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value = 200+Math.random()*200; f.Q.value=3;
    const f2 = ctx.createBiquadFilter(); f2.type='lowpass'; f2.frequency.value=800;
    osc.connect(f); f.connect(f2); f2.connect(g);
    osc.start(); lfo.start();
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gainVal, now+attack);
    return { gain:g, oscs:[osc,lfo] };
  }
  
  function meerCluster(notes, dur){
    const newV = [];
    for(const f of notes) newV.push(meerVoice(f, 0.04+Math.random()*0.03, 4+Math.random()*3));
    newV.push(meerVoice(notes[0]/2, 0.12, 5));
    for(const v of newV) STATE.meerVoices.push(v);
    setTimeout(()=>fadeVoices(newV, 6), Math.max(2000, (dur-6)*1000));
  }
  
  function nextMeer(){
    if(!STATE.meerPlaying) return;
    const cluster = MEER_CLUSTERS[STATE.meerIdx];
    const dur = STATE.endgame ? 10 : 16;
    meerCluster(cluster, dur);
    STATE.meerIdx = (STATE.meerIdx+1) % MEER_CLUSTERS.length;
    STATE.meerTimer = setTimeout(nextMeer, dur*1000);
  }
  
  function welleVoice(freq, gainVal, attack){
    const ctx = STATE.ctx;
    const g = ctx.createGain(); g.gain.value=0; g.connect(STATE.welleGain);
    const detunes=[-7,0,7]; const oscs=[];
    for(const d of detunes){
      const osc = ctx.createOscillator(); osc.type='sawtooth';
      osc.frequency.value=freq; osc.detune.value=d;
      const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1400; f.Q.value=0.7;
      osc.connect(f); f.connect(g); osc.start(); oscs.push(osc);
    }
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gainVal, now+attack);
    return { gain:g, oscs };
  }
  
  function welleChord(chord, dur){
    const newV = [];
    newV.push(welleVoice(chord.notes[0]/2, 0.12, 4.5));
    for(const f of chord.notes) newV.push(welleVoice(f, 0.08, 5.5));
    for(const v of newV) STATE.welleVoices.push(v);
    setTimeout(()=>fadeVoices(newV, 5), Math.max(2000, (dur-5)*1000));
  }
  
  function nextWelle(){
    if(!STATE.wellePlaying) return;
    const c = WELLE_CHORDS[STATE.welleIdx];
    const dur = STATE.endgame ? c.duration*0.65 : c.duration;
    welleChord(c, dur);
    STATE.welleIdx = (STATE.welleIdx+1) % WELLE_CHORDS.length;
    STATE.welleTimer = setTimeout(nextWelle, dur*1000);
  }
  
  function fadeVoices(voices, fadeTime){
    if(!STATE.ctx) return;
    const now = STATE.ctx.currentTime;
    for(const v of voices){
      try{
        v.gain.gain.cancelScheduledValues(now);
        v.gain.gain.setValueAtTime(v.gain.gain.value, now);
        v.gain.gain.linearRampToValueAtTime(0, now+fadeTime);
        setTimeout(()=>{ for(const o of v.oscs) try{ o.stop(); }catch(e){} }, fadeTime*1000+500);
      }catch(e){}
    }
  }
  
  // Synchronous state flip — returns new state immediately so the UI updates
  // without waiting for async audio context setup. This makes repeated taps safe:
  // each click flips state predictably, the async audio work runs in background.
  function toggle(){
    if(!STATE.on){
      // Switch ON synchronously; audio context setup runs in background
      STATE.on = true;
      // Kick off audio setup async (no await — fire and forget)
      (async ()=>{
        const ok = await ensureCtx();
        if(!ok || !STATE.on) return; // bail if context failed or user already toggled off
        setupChains();
        STATE.meerPlaying = true;
        STATE.meerIdx = 0;
        nextMeer();
        setTimeout(()=>{
          if(!STATE.on) return; // user toggled off in the meantime
          STATE.wellePlaying = true;
          STATE.welleIdx = 0;
          nextWelle();
        }, 3000);
      })();
      return true;
    } else {
      // Switch OFF synchronously; fade-out runs in background
      STATE.on = false;
      STATE.meerPlaying = false; STATE.wellePlaying = false; STATE.endgame = false;
      if(STATE.meerTimer) clearTimeout(STATE.meerTimer);
      if(STATE.welleTimer) clearTimeout(STATE.welleTimer);
      fadeVoices(STATE.meerVoices, 1);
      fadeVoices(STATE.welleVoices, 0.8);
      STATE.meerVoices = []; STATE.welleVoices = [];
      return false;
    }
  }
  
  function activateEndgame(){
    if(!STATE.on || STATE.endgame) return;
    STATE.endgame = true;
  }
  
  // Word: ascending bell, played into welleGain (foreground)
  function playWord(){
    if(!STATE.on || !STATE.ctx) return;
    const ctx = STATE.ctx;
    const now = ctx.currentTime;
    for(let i=0; i<ASCENT.length; i++){
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = ASCENT[i];
      const g = ctx.createGain(); g.gain.value = 0;
      osc.connect(g); g.connect(STATE.welleGain);
      osc.start(now + i*0.04);
      g.gain.linearRampToValueAtTime(0.12 / Math.sqrt(i+1), now + 0.06 + i*0.04);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      osc.stop(now + 1.9);
    }
  }
  
  // Fall: descending mirror — proportional to count
  // count=1 → only one note (440Hz center)
  // count=2 → two notes descending  
  // count=3+ → full descent
  function playFall(count){
    if(!STATE.on || !STATE.ctx) return;
    if(!count || count < 1) count = 1;
    const ctx = STATE.ctx;
    const now = ctx.currentTime;
    
    // Pick how many tones to play
    let tones;
    if(count === 1){
      tones = [440];  // single mid tone
    } else if(count === 2){
      tones = [660, 440];  // two descending
    } else if(count === 3){
      tones = [880, 660, 440];  // three
    } else {
      tones = DESCENT;  // full 4-note descent
    }
    
    // Play descending — darker timbre via lowpass, into meerGain (background)
    for(let i=0; i<tones.length; i++){
      const osc = ctx.createOscillator();
      osc.type = 'triangle';  // softer than sine, warmer
      osc.frequency.value = tones[i];
      const g = ctx.createGain(); g.gain.value = 0;
      
      // Lowpass to make it dark (mirror of word's bright sine)
      const f = ctx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.value = 1100;
      f.Q.value = 0.7;
      
      osc.connect(f); f.connect(g); g.connect(STATE.meerGain);
      osc.start(now + i*0.05);
      // Slightly stronger early gain so the descent is felt
      g.gain.linearRampToValueAtTime(0.16 / Math.sqrt(i+1), now + 0.06 + i*0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.6 + i*0.1);
      osc.stop(now + 1.8 + i*0.1);
    }
    
    // Also a short low sub-thump for the impact (count-modulated depth)
    const sub = ctx.createOscillator();
    sub.type = 'sine';
    const subStartFreq = Math.min(120, 60 + count*15);  // bigger drop = deeper start
    sub.frequency.setValueAtTime(subStartFreq, now);
    sub.frequency.exponentialRampToValueAtTime(28, now + 0.5);
    const sg = ctx.createGain(); sg.gain.value = 0;
    sub.connect(sg); sg.connect(STATE.meerGain);
    sub.start(now);
    sg.gain.linearRampToValueAtTime(0.18 + Math.min(0.15, count*0.04), now + 0.02);
    sg.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    sub.stop(now + 1.0);
  }
  
  // Return: short sparkly tone per returning stone
  // Index 0..n-1, plays a small ascending arpeggio across multiple stones
  function playReturn(index){
    if(!STATE.on || !STATE.ctx) return;
    const ctx = STATE.ctx;
    const now = ctx.currentTime;
    // Klangschale — immer derselbe Grundton (kein Glockenspiel-Effekt)
    const fund = 220;
    
    // Singing bowls have inharmonic partials — slightly off from pure octaves
    // Real bowl ratios: 1.0, 2.79, 5.43
    const partials = [
      { f: 1.0,    g: 0.20, decay: 4.0 },   // fundamental, longest
      { f: 2.79,   g: 0.10, decay: 3.0 },   // 2nd partial — inharmonic
      { f: 5.43,   g: 0.04, decay: 2.0 },   // 3rd partial — gives sparkle
    ];
    const beatingDetune = 1.003;
    
    for(const p of partials){
      // Pair of oscillators with very slight detune for beating effect
      for(let pair=0; pair<2; pair++){
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = fund * p.f * (pair===0 ? 1 : beatingDetune);
        const g = ctx.createGain(); g.gain.value = 0;
        const direct = ctx.createGain(); direct.gain.value = 0.75;
        osc.connect(g); g.connect(direct); direct.connect(ctx.destination);
        osc.start(now);
        // Soft swelling attack — bowl-like (60ms)
        const peakGain = pair===0 ? p.g : p.g * 0.5;
        g.gain.linearRampToValueAtTime(peakGain, now + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, now + p.decay);
        osc.stop(now + p.decay + 0.1);
      }
    }
    
    // Subtle low rumble for "weight"
    const sub = ctx.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = fund / 2;
    const sg = ctx.createGain(); sg.gain.value = 0;
    sub.connect(sg); sg.connect(ctx.destination);
    sub.start(now);
    sg.gain.linearRampToValueAtTime(0.06, now + 0.1);
    sg.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    sub.stop(now + 2.6);
  }
  
  function isOn(){ return STATE.on; }
  
  window.SHOVEAUDIO = { toggle, playWord, playFall, playReturn, activateEndgame, isOn };
  
  // SVG icons — speaker on / muted
  const SVG_ON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
  const SVG_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
  
  // Inject speaker toggle button — fixed top-right, dezent
  function injectToggle(){
    if(document.getElementById('shoveAudioToggle')) return;
    const btn = document.createElement('button');
    btn.id = 'shoveAudioToggle';
    btn.title = 'Klangwelt an/aus';
    btn.innerHTML = SVG_OFF;
    btn.style.cssText = 'position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.25);color:rgba(255,255,255,.5);cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:inherit;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:all .25s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation;padding:0';
    btn.addEventListener('click', ()=>{
      const isOn = toggle();
      if(isOn){
        btn.style.borderColor = '#6dc7c7';
        btn.style.color = '#6dc7c7';
        btn.style.background = 'rgba(109,199,199,.12)';
        btn.innerHTML = SVG_ON;
      } else {
        btn.style.borderColor = 'rgba(255,255,255,.18)';
        btn.style.color = 'rgba(255,255,255,.5)';
        btn.style.background = 'rgba(0,0,0,.25)';
        btn.innerHTML = SVG_OFF;
      }
    });
    document.body.appendChild(btn);
  }
  
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', injectToggle);
  } else {
    injectToggle();
  }
})();

  function fmtName(text){
    const name = (typeof playerName !== 'undefined' && playerName) ? playerName : '';
    if(!name){
      // Strip {name_comma} placeholder cleanly
      return text.replace(/\{name_comma\}/g, '').replace(/\s\s+/g, ' ').trim();
    }
    return text.replace(/\{name_comma\}/g, ', ' + name);
  }
  
  function pick(triggerKey, opts){
    if(!STATE.on) return null;
    const triggerObj = POOLS[triggerKey];
    if(!triggerObj) return null;
    
    // Determine current level
    const lvl = (typeof kiLevel !== 'undefined') ? kiLevel : 2;
    // 1=Nice, 2=Great, 3=Sharp
    
    // Pick the right sub-pool
    let pool;
    if(lvl === 1){
      // Nice → nice pool wenn vorhanden, sonst default
      pool = triggerObj.nice || triggerObj.default;
    } else if(lvl === 3 && triggerObj.sharp){
      pool = triggerObj.sharp;
    } else {
      pool = triggerObj.default;
    }
    if(!pool) return null;
    
    // Avoid same trigger firing in immediate sequence
    if(STATE.lastTrigger === triggerKey && Math.random() > 0.4) return null;
    
    // Pick a non-used variant
    const available = pool.filter(t => !STATE.used.has(t));
    let chosen;
    if(available.length === 0){
      STATE.used.clear();
      chosen = pool[Math.floor(Math.random() * pool.length)];
    } else {
      const useName = Math.random() < 0.25;
      const filtered = available.filter(t => useName ? t.includes('{name_comma}') : true);
      const finalPool = filtered.length > 0 ? filtered : available;
      chosen = finalPool[Math.floor(Math.random() * finalPool.length)];
    }
    STATE.used.add(chosen);
    STATE.lastTrigger = triggerKey;
    
    // Fill in placeholders
    let result = fmtName(chosen);
    if(opts && opts.location){
      result = result.replace(/\{loc\}/g, opts.location);
    }
    if(opts && typeof opts.missedGain !== 'undefined'){
      result = result.replace(/\{gain\}/g, String(opts.missedGain));
    }
    if(opts && typeof opts.kill !== 'undefined'){
      result = result.replace(/\{kill\}/g, String(opts.kill));
      // {killWord} → deutsches Zahlwort für die Kill-Zahl
      const numWord = (n) => {
        // Max 6 Kills im Spiel (4 Buchstaben pro Reihe + Push); für robusten Code aber bis 6 abgedeckt
        const w = ['null','ein','zwei','drei','vier','fünf','sechs'];
        return (n >= 0 && n < w.length) ? w[n] : String(n);
      };
      result = result.replace(/\{killWord\}/g, numWord(opts.kill));
      // {KillWord} = großgeschrieben (für Satzanfänge)
      result = result.replace(/\{KillWord\}/g, numWord(opts.kill).charAt(0).toUpperCase() + numWord(opts.kill).slice(1));
    }
    if(opts && typeof opts.loss !== 'undefined'){
      result = result.replace(/\{loss\}/g, String(opts.loss));
    }
    if(opts && typeof opts.net !== 'undefined'){
      result = result.replace(/\{net\}/g, String(opts.net));
    }
    return result;
  }
  
  function showBox(text){
    if(!text) return;
    let box = document.getElementById('shoveBotChat');
    
    if(!box){
      // Append to body so the chat box survives render() calls that rebuild #app.innerHTML
      box = document.createElement('div');
      box.id = 'shoveBotChat';
      document.body.appendChild(box);
    }
    
    // Set content and base styles, but keep INVISIBLE (opacity 0) until position is correct.
    // This prevents the visible "jump" from default position to final position.
    box.style.cssText = 'position:absolute;top:0;left:50%;transform:translateX(-50%);max-width:560px;width:calc(100% - 32px);padding:11px 14px;border-left:2px solid #6dc7c7;background:rgba(109,199,199,.10);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:0 6px 6px 0;z-index:50;display:block;opacity:0;transition:opacity .25s ease-out';
    box.innerHTML = '<div style="font-size:9px;letter-spacing:1.5px;color:#6dc7c7;margin-bottom:3px;font-weight:600">BOT</div><div style="font-size:13px;color:rgba(255,255,255,.82);line-height:1.5;font-style:italic">' + text + '</div>';
    
    // Wait for layout to stabilize, then set position AND fade in.
    // requestAnimationFrame ensures the browser has computed layout for the board.
    requestAnimationFrame(()=>{
      const board = document.querySelector('.board');
      if(board){
        const rect = board.getBoundingClientRect();
        box.style.top = (window.scrollY + rect.bottom + 14) + 'px';
      }
      // Now fade in at the correct position
      box.style.opacity = '1';
    });
  }
  
  function hideBox(){
    const box = document.getElementById('shoveBotChat');
    if(box) box.style.display = 'none';
  }
  
  // Inject CSS for fade-in animation
  function injectCSS(){
    if(document.getElementById('shoveBotChatCSS')) return;
    const s = document.createElement('style');
    s.id = 'shoveBotChatCSS';
    s.textContent = '@keyframes shoveBotChatIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }';
    document.head.appendChild(s);
  }
  
  // === EVENT API ===
  // These are called from hook points in the game logic
  
  function onPlayerMove(opts){
    // opts: { wordsFormed, killsCount, longestWord, wordPossibleButMissed, location }
    if(!STATE.on){ hideBox(); return; }
    
    if(opts.wordsFormed === 0){
      STATE.consecutiveNoWord++;
      
      // Trigger 1: kein wort gebildet, aber wort möglich (Mehrgewinn)
      if(opts.wordPossibleButMissed){
        const txt = pick('no_word_possible', {location: opts.location, missedGain: opts.missedGain});
        if(txt){ showBox(txt); return; }
      }
      
      // KILLING-BILANZ: differenziertes Lob/Warnung je nach Bilanz
      // netto = killsCount - playerLoss
      // GOOD_KILLING: 3+ Kills UND netto >= +2 → echtes Killing wert
      // BAD_KILLING: 1+ Kills UND netto <= +1 → Patt oder Verlust beim Killen
      if(typeof opts.killsCount === 'number' && opts.killsCount >= 1){
        const _loss = (typeof opts.playerLoss === 'number') ? opts.playerLoss : 0;
        const _net = opts.killsCount - _loss;
        
        if(opts.killsCount >= 3 && _net >= 2){
          // Echtes Killing — Anerkennung
          const txt = pick('good_killing', {kill: opts.killsCount, loss: _loss});
if(txt){ showBox(txt); return; }
        } else if(_net <= 1){
          // Patt oder Verlust beim Killen — didaktischer Hinweis
          const txt = pick('bad_killing', {kill: opts.killsCount, loss: _loss, net: _net});
          if(txt){ showBox(txt); return; }
        }
      }
      
      // Trigger 7: drei Züge in Folge ohne Wort
      if(STATE.consecutiveNoWord >= 3){
        const txt = pick('three_no_word');
        if(txt){ showBox(txt); STATE.consecutiveNoWord = 0; return; }
      }
      
      hideBox();
    } else {
      STATE.consecutiveNoWord = 0;
      STATE.gameWordsCount++;
      
      // BAD_TRADE: Wort gebildet, aber mehr eigene verloren als gegnerische gekillt
      // Schwelle: netto -1 (also playerLoss > killsCount)
      if(typeof opts.playerLoss === 'number' && opts.playerLoss > opts.killsCount){
        const _net = opts.playerLoss - opts.killsCount;
        const txt = pick('bad_trade', {kill: opts.killsCount, loss: opts.playerLoss, net: _net});
        if(txt){ showBox(txt); return; }
      }
      
      // NULL_TRADE: Wort gebildet, genau so viele eigene wie gegnerische gefallen
      // (nur wenn killsCount > 0 — sonst trivial 0=0)
      if(typeof opts.playerLoss === 'number' && opts.playerLoss === opts.killsCount && opts.killsCount > 0){
        const txt = pick('null_trade', {kill: opts.killsCount, loss: opts.playerLoss});
        if(txt){ showBox(txt); return; }
      }
      
      if(opts.killsCount >= 3){
        const txt = pick('many_kills', {kill: opts.killsCount});
        if(txt){ showBox(txt); return; }
      }
      
      hideBox();
    }
  }
  
  function onBoardDelta(opts){
    // opts: { destroyedBotWord: boolean }
    if(!STATE.on) return;
    if(opts.destroyedBotWord){
      const txt = pick('word_destroyed');
      if(txt){ showBox(txt); return; }
    }

  function onBotMove(opts){
    // opts: { killsCount, longestWord }
    if(!STATE.on) return;
    
    // Trigger 8: Bot ist stolz (3+ kills mit eigenem Wort)
    // ABER: nicht beim allerersten Bot-Zug — da hat der Spieler noch nichts gemacht,
    // Sätze wie "Du machst es spannend, ich bleibe dran" ergeben keinen Sinn.
    const _bmc = (typeof _botMoveCount !== 'undefined') ? _botMoveCount : 0;
    if(opts.killsCount >= 3 && opts.longestWord && _bmc >= 2){
      const txt = pick('bot_proud', {kill: opts.killsCount});
      if(txt){ showBox(txt); return; }
    }
    
    hideBox();
  }

  function recordBotWord(word){
    if(!word) return;
    STATE.botLastWords.push(word.toLowerCase());
    if(STATE.botLastWords.length > 5) STATE.botLastWords.shift();
  }
  
  // Trigger 16: detect endgame trap
  // Returns location string ("Reihe X" or "Spalte Y") if player has 3+ stones in a line
  // that the bot could eliminate in next move; null otherwise.
  // (detectEndgameTrap entfernt — T10 zusammengeführt mit T11/trap_warning)
  
  function checkBotWordDestroyed(currentBoard){
    // Build set of all words currently on board
    const stillThere = new Set();
    try{
      const all = (typeof findAllWords === 'function') ? findAllWords(currentBoard) : [];
      for(const w of all) stillThere.add(w.word.toLowerCase());
    }catch(e){ return false; }
    // Was any of bot's last words destroyed?
    for(const w of STATE.botLastWords){
      if(!stillThere.has(w)){
        // Destroyed — remove from list so we don't trigger again
        STATE.botLastWords = STATE.botLastWords.filter(x => x !== w);
        return true;
      }
    }
    return false;
  }
  
  function reset(){
    STATE.used.clear();
    STATE.lastTrigger = null;
    STATE.consecutiveNoWord = 0;
    STATE.botLastWords = [];
    STATE.gameWordsCount = 0;
    hideBox();
  }
  
  function setEnabled(v){
    STATE.on = v;
    if(!v) hideBox();
  }
  function isOn(){ return STATE.on; }
  
  // === INJECT TOGGLE BUTTON (chat bubble) ===
  // Speech-bubble icon — different from speaker
  const SVG_BUBBLE_ON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h11c.55 0 1-.45 1-1z"/></svg>';
  const SVG_BUBBLE_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M2.27 1.72L1 3l1.84 1.84L2 5v17l4-4h11l4.18 4.18 1.27-1.27L2.27 1.72zM6 14l-2 2V5.27L14.73 16H7l-1 1v-3zm9.73-2H17V4H6.27L4.55 2.27C4.7 2.11 4.83 2 5 2h17c.55 0 1 .45 1 1v17l-3.18-3.18L17.73 12H15.73z"/></svg>';
  
  function injectToggle(){
    if(document.getElementById('shoveBotChatToggle')) return;
    const btn = document.createElement('button');
    btn.id = 'shoveBotChatToggle';
    btn.title = 'Bot-Kommentare an/aus';
    btn.innerHTML = SVG_BUBBLE_ON;
    // Position next to speaker (which is at top:14, right:14, w:38). Place this 8px to its left.
    btn.style.cssText = 'position:fixed;top:14px;right:62px;width:38px;height:38px;border-radius:50%;border:1px solid rgba(109,199,199,.4);background:rgba(109,199,199,.12);color:#6dc7c7;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:inherit;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:all .25s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation;padding:0';
    btn.addEventListener('click', ()=>{
      setEnabled(!STATE.on);
      if(STATE.on){
        btn.style.borderColor = '#6dc7c7';
        btn.style.color = '#6dc7c7';
        btn.style.background = 'rgba(109,199,199,.12)';
        btn.innerHTML = SVG_BUBBLE_ON;
      } else {
        btn.style.borderColor = 'rgba(255,255,255,.18)';
        btn.style.color = 'rgba(255,255,255,.5)';
        btn.style.background = 'rgba(0,0,0,.25)';
        btn.innerHTML = SVG_BUBBLE_OFF;
      }
    });
    document.body.appendChild(btn);
  }
  
  // Public API
  // === FILMZITAT vor finalem Bot-Sieg-Zug ===
  const FINAL_QUOTES = [
    // Original 10
    { text: "Hasta la vista, Baby.",                                                     src: "Terminator 2 · 1991" },
    { text: "I'll be back.",                                                              src: "The Terminator · 1984" },
    { text: "Consider that a divorce.",                                                   src: "Total Recall · 1990" },
    { text: "I'm your Huckleberry.",                                                      src: "Tombstone · 1993" },
    { text: "We're gonna need a bigger boat.",                                            src: "Der weiße Hai · 1975" },
    { text: "Say hello to my little friend.",                                             src: "Scarface · 1983" },
    { text: "Frankly, my dear, I don't give a damn.",                                     src: "Vom Winde verweht · 1939" },
    { text: "Here's looking at you, kid.",                                                src: "Casablanca · 1942" },
    { text: "You shall not pass!",                                                        src: "Der Herr der Ringe · 2001" },
    { text: "Bond. James Bond.",                                                          src: "Dr. No · 1962" },
    // Sergio Leone & SciFi
    { text: "When you have to shoot, shoot. Don't talk.",                                 src: "Zwei glorreiche Halunken · 1966" },
    { text: "God's not on our side because he hates idiots.",                             src: "Zwei glorreiche Halunken · 1966" },
    { text: "There's two kinds of people, my friend: those with loaded guns, and those who dig. You dig.", src: "Zwei glorreiche Halunken · 1966" },
    { text: "I'm sorry, Dave. I'm afraid I can't do that.",                               src: "2001: Odyssee im Weltraum · 1968" },
    { text: "We need to go deeper.",                                                      src: "Inception · 2010" },
    { text: "The spice must flow.",                                                       src: "Dune · 1984" },
    { text: "Resistance is futile.",                                                      src: "Star Trek: The Next Generation · 1990" },
  ];
  
  function showFinalQuote(){
    if(!STATE.on) return;
    const q = FINAL_QUOTES[Math.floor(Math.random() * FINAL_QUOTES.length)];
    let box = document.getElementById('shoveBotChat');
    if(!box){
      box = document.createElement('div');
      box.id = 'shoveBotChat';
      document.body.appendChild(box);
    }
    box.style.cssText = 'position:absolute;top:0;left:50%;transform:translateX(-50%);max-width:560px;width:calc(100% - 32px);padding:11px 14px;border-left:2px solid #6dc7c7;background:rgba(109,199,199,.10);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:0 6px 6px 0;z-index:50;display:block;opacity:0;transition:opacity .25s ease-out';
    box.innerHTML = '<div style="font-size:9px;letter-spacing:1.5px;color:#6dc7c7;margin-bottom:5px;font-weight:600">BOT</div>' +
                    '<div style="font-size:14px;color:rgba(255,255,255,.92);line-height:1.5;font-style:italic">&ldquo;' + q.text + '&rdquo;</div>' +
                    '<div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.5px">— ' + q.src + '</div>';
    requestAnimationFrame(()=>{
      const board = document.querySelector('.board');
      if(board){
        const rect = board.getBoundingClientRect();
        box.style.top = (window.scrollY + rect.bottom + 14) + 'px';
      }
      box.style.opacity = '1';
    });
  }
  
  function onPlayerEndgameTrap(opts){
    // opts: { location: "Reihe 3" | "Spalte D", killCount: number }
    if(!STATE.on) return;
    // Only fire if level is Nice (1) or Great (2), NOT Sharp (3)
    const lvl = (typeof kiLevel !== 'undefined') ? kiLevel : 2;
    if(lvl === 3) return;
    const txt = pick('trap_warning', {location: opts.location});
    if(txt) showBox(txt);
  }
  
  window.SHOVECHAT = {
    onPlayerMove, onBoardDelta, onBotMove, onPlayerEndgameTrap,
    showFinalQuote,
    recordBotWord, checkBotWordDestroyed, reset, setEnabled, isOn, hideBox,
  };
  
  injectCSS();
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', injectToggle);
  } else {
    injectToggle();
  }
})();

</script>
</body>
