@keyframes wordReveal{0%{opacity:0;transform:scale(.7) translateY(8px)}60%{opacity:1;transform:scale(1.08) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes letterPulse{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.35);filter:brightness(2.2)}100%{transform:scale(1);filter:brightness(1.3)}}
@keyframes wordOverlay{0%{opacity:0;transform:scale(.85)}12%{opacity:1;transform:scale(1)}85%{opacity:1}100%{opacity:0;transform:scale(1.04)}}

@keyframes labelPop{0%{opacity:0;transform:scale(.5) translateY(4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

@keyframes pulseJump{0%,100%{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.25)}50%{background:rgba(96,165,250,.18);border-color:rgba(96,165,250,.55)}}
.wave-bg{position:fixed;bottom:0;left:0;width:100%;height:35%;opacity:.07;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:8px 6px;min-height:100vh;width:100%;max-width:820px}
.title{font-size:48px;font-weight:900;color:#f59e0b;letter-spacing:6px;text-shadow:0 0 30px rgba(245,158,11,.5);animation:glow 3s ease-in-out infinite}
.title-sm{font-size:22px;font-weight:900;color:#f59e0b;letter-spacing:3px;text-shadow:0 0 15px rgba(245,158,11,.3)}
.board-wrap{position:relative;margin:6px 0}
.board{display:inline-grid;padding:12px;background:rgba(0,30,60,.65);border-radius:14px;border:2px solid rgba(255,255,255,.1);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.cell{border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.06);transition:border-color .15s,background .15s;font-weight:900;font-size:20px}
.tile{width:100%;height:100%;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;position:relative;border:2px solid;transition:all .2s}
.tile.p1{background:linear-gradient(145deg,#fbbf24,#f59e0b);border-color:#d97706;color:#78350f;text-shadow:0 1px 0 rgba(255,255,255,.3)}
.tile.p2{background:linear-gradient(145deg,#f87171,#ef4444);border-color:#dc2626;color:#7f1d1d;text-shadow:0 1px 0 rgba(255,255,255,.3)}
.tile.returned{animation:returnPop 1.1s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 0 24px 8px rgba(147,197,253,.55),0 0 48px 16px rgba(147,197,253,.2)}
.cell.h-sel{animation:pulseSel 1.2s ease-in-out infinite;border-color:rgba(245,158,11,.8)!important}
.cell.h-free{animation:pulseJump 1.4s ease-in-out infinite;cursor:pointer}
.cell.h-free:hover{background:rgba(96,165,250,.25)!important;border-color:rgba(96,165,250,.7)!important}
.cell.hl-row{background:rgba(76,175,80,.25)!important;border-color:rgba(76,175,80,.6)!important}
.cell.hl-col{background:rgba(66,165,245,.2)!important;border-color:rgba(66,165,245,.55)!important}
.push-arrow{position:absolute;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;z-index:18;animation:arrowIn .25s ease-out;transition:transform .1s,background .1s}
.push-arrow.ok{background:rgba(245,158,11,.85);border:2px solid #f59e0b;color:#78350f;cursor:pointer;box-shadow:0 2px 14px rgba(245,158,11,.45)}
.push-arrow.ok:hover{background:#f59e0b;transform:scale(1.18)!important}
.push-arrow.bad{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);color:rgba(255,255,255,.18);pointer-events:none}
.word-label{position:absolute;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:.5px;white-space:nowrap;z-index:15;pointer-events:none;animation:labelPop .4s ease-out;border:1.5px solid}
.comment-bar{width:100%;min-height:36px;max-height:70px;overflow:hidden;margin:5px 0;padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;line-height:1.6;color:rgba(255,255,255,.55);text-align:center}

.comment-bar.gold{border-color:rgba(245,158,11,.3);color:#f59e0b;background:rgba(245,158,11,.06)}

.comment-bar.ai{border-color:rgba(239,68,68,.2);color:rgba(255,255,255,.5);background:rgba(239,68,68,.04)}

.phase-badge.ki{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}

.stone-count.p2c{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);}
.stone-num{font-size:24px;font-weight:900;}
.stone-lbl{font-size:8px;letter-spacing:2px;opacity:.5;}

.ctrl-btn{padding:14px 28px;font-size:11px;font-weight:700;letter-spacing:1px;border:2px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:Georgia,serif;transition:background .15s,border-color .15s,opacity .15s;min-height:48px}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn.gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border-color:#d97706}
.ctrl-btn.blue{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.35);color:#93c5fd}

.split-prev-label{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase}

.sc-pip.p2{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);border:2px solid #dc2626}

function botThinkingMsg(b,ai,human){
  const c_ai=cnt(b,ai),c_hu=cnt(b,human);
  const total=c_ai+c_hu;
  if(c_ai<=6||c_hu<=6) return `<span style="animation:aiThink 1.2s ease-in-out infinite;display:inline-block">${_botPick(BOT.thinking.endgame)}</span>`;
  if(c_ai>c_hu+4) return `<span style="animation:aiThink 1.2s ease-in-out infinite;display:inline-block">${_botPick(BOT.thinking.ahead)}</span>`;
  if(c_ai<c_hu-4) return `<span style="animation:aiThink 1.2s ease-in-out infinite;display:inline-block">${_botPick(BOT.thinking.behind)}</span>`;

function botKiMoveVoice(kills,newWords,b,ai,human){
  // Kommentar den KI nach eigenem Zug macht
  const c_ai=cnt(b,ai),c_hu=cnt(b,human);
  if(newWords&&newWords.length>0){
    const longest=Math.max(...newWords.map(w=>w.word.length));
    if(longest>=7) return _botPick(BOT.ki_formed.long);
    if(longest>=5) return _botPick(BOT.ki_formed.medium);
    return _botPick(BOT.ki_formed.short);
  }
  if(kills>=3) return _botPick(BOT.ki_big_kill);
  if(c_ai>c_hu+5) return _botPick(BOT.winning);
  if(c_ai<c_hu-5) return _botPick(BOT.losing);
  return _botPick(BOT.ki_no_word);
}

function botReactToHumanVoice(kills,newWords,b,ai,human){
  // KI-Reaktion auf den menschlichen Zug (kurz, in 2. Zeile des Comment)
  if(newWords&&newWords.length>0){
    const longest=Math.max(...newWords.map(w=>w.word.length));
    if(longest>=6) return _botPick(BOT.react_human_word.long);
    return _botPick(BOT.react_human_word.short);
  }
  return null; // Bei keinem Wort keinen Kommentar (zu aufdringlich)
}

function K(x,y){return x+","+y;}
function PK(k){const[x,y]=k.split(",").map(Number);return{x,y};}
function cnt(b,p){return Object.values(b).filter(s=>s&&s.owner===p).length;}
function letterAt(x,y){return currentBoardDef?currentBoardDef.rows[y][x]:"?";}

function pickBoard(){
  if(_usedBoardIndices.length>=BOARD_POOL.length)_usedBoardIndices=[];
  const avail=BOARD_POOL.map((_,i)=>i).filter(i=>!_usedBoardIndices.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  _usedBoardIndices.push(idx);
  return BOARD_POOL[idx];
}

function buildStartBoard(preset){
  const b={};
  const EMPTY_START=new Set(["6,5"]);
  for(let y=0;y<G;y++){
    for(let x=0;x<G;x++){
      const k=K(x,y);
      if(EMPTY_START.has(k))continue;
      b[k]={owner:P1,ch:preset.rows[y][x]};
    }
  }
  return b;
}

function randomizeOwners(b){
  const keys=Object.keys(b);
  const shuffled=[...keys];
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  const half=Math.ceil(shuffled.length/2);
  const nb={};
  shuffled.forEach((k,i)=>{
    nb[k]={...b[k],owner:i<half?P1:P2};
  });
  return nb;
}

function findWordsInLine(cells){
  const words=[];let i=0;
  while(i<cells.length){
    if(!cells[i]){i++;continue;}
    let j=i;while(j<cells.length&&cells[j])j++;
    const seg=cells.slice(i,j);
    if(seg.length>=4){
      for(let a=0;a<seg.length;a++){
        for(let b=a+4;b<=seg.length;b++){
          const w=seg.slice(a,b).map(c=>c.ch.toLowerCase()).join("");
          if(WORDS.has(w))words.push({word:w.toUpperCase(),start:i+a,end:i+b-1,letters:seg.slice(a,b)});
        }
      }
    }
    i=j;
  }
  return words;
}

function findAllWords(b){
  const all=[];
  for(let y=0;y<G;y++){
    const row=[];for(let x=0;x<G;x++)row.push(b[K(x,y)]||null);
    const ws=findWordsInLine(row);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(i,y));w.dir="row";});
    all.push(...ws);
  }
  for(let x=0;x<G;x++){
    const col=[];for(let y=0;y<G;y++)col.push(b[K(x,y)]||null);
    const ws=findWordsInLine(col);
    ws.forEach(w=>{w.cells=[];for(let i=w.start;i<=w.end;i++)w.cells.push(K(x,i));w.dir="col";});
    all.push(...ws);
  }
  const unique=[],used=new Set();
  for(const w of all){const key=w.cells.join("|")+w.word;if(!used.has(key)){used.add(key);unique.push(w);}}
  return unique;
}

function wordKey(w){return w.cells.join("|")+w.word;}

function getNewWords(before,after){
  if(!before||!after)return[];
  const bKeys=new Set(before.map(wordKey));
  return after.filter(w=>!bKeys.has(wordKey(w)));
}

function computePush(b,px,py,dx,dy,d){
  const pieces=[];let cx=px,cy=py;
  while(cx>=0&&cx<G&&cy>=0&&cy<G){const k=K(cx,cy);if(b[k])pieces.push({x:cx,y:cy,...b[k]});cx+=dx;cy+=dy;}
  if(!pieces.length)return null;
  const np=[{...pieces[0],origX:pieces[0].x,origY:pieces[0].y,x:pieces[0].x+dx*d,y:pieces[0].y+dy*d}];
  for(let i=1;i<pieces.length;i++){
    const prev=np[i-1],orig=pieces[i];let nx=orig.x,ny=orig.y;
    if(dx)nx=dx>0?Math.max(orig.x,prev.x+dx):Math.min(orig.x,prev.x+dx);
    if(dy)ny=dy>0?Math.max(orig.y,prev.y+dy):Math.min(orig.y,prev.y+dy);
    np.push({...orig,origX:orig.x,origY:orig.y,x:nx,y:ny});
  }
  const removed=[],remaining=[];
  for(const p of np)(p.x<0||p.x>=G||p.y<0||p.y>=G?removed:remaining).push(p);
  return{removed,remaining,originalPieces:pieces};
}

function getPushesFrom(b,player,fx,fy){
  const moves=[];
  for(const dir of DIRS){
    for(let d=1;d<G*2;d++){
      const r=computePush(b,fx,fy,dir.dx,dir.dy,d);if(!r)break;
      const oppR=r.removed.filter(p=>p.owner!==player).length;
      const ownR=r.removed.filter(p=>p.owner===player).length;
      if(oppR>0&&ownR===0){
        const pushKeys=new Set(r.originalPieces.map(p=>K(p.x,p.y)));
        let overlap=false;
        for(const p of r.remaining){if(b[K(p.x,p.y)]&&!pushKeys.has(K(p.x,p.y))){overlap=true;break;}}
        const nx=fx+dir.dx*d,ny=fy+dir.dy*d;
        if(!overlap&&nx>=0&&nx<G&&ny>=0&&ny<G)
          moves.push({x:fx,y:fy,dir,d,result:r,destX:nx,destY:ny});
      }
      if(fx+dir.dx*d<0||fx+dir.dx*d>=G||fy+dir.dy*d<0||fy+dir.dy*d>=G)break;
    }
  }
  return moves;
}

function getPushMoves(b,player){
  const moves=[];
  for(const k in b){
    const tile=b[k];if(!tile||tile.owner!==player)continue;
    const{x,y}=PK(k);
    moves.push(...getPushesFrom(b,player,x,y));
  }
  return moves;
}

function applyPush(b,m){
  const nb=Object.assign({},b);
  for(const p of m.result.originalPieces)delete nb[K(p.x,p.y)];
  for(const p of m.result.remaining)nb[K(p.x,p.y)]={owner:p.owner,ch:p.ch};
  return nb;
}

function applyJump(b,fromX,fromY,toX,toY){
  const nb=Object.assign({},b);
  const tile=nb[K(fromX,fromY)];delete nb[K(fromX,fromY)];
  nb[K(toX,toY)]=tile;
  return nb;
}

// ═══════════════════════════════════════════
//  STEINE ZURÜCKGEBEN
// ═══════════════════════════════════════════
function returnStones(player,count){
  const emptyFields=[];
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){const k=K(x,y);if(!board[k])emptyFields.push({k,x,y});}
  for(let i=emptyFields.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[emptyFields[i],emptyFields[j]]=[emptyFields[j],emptyFields[i]];}
  const actual=Math.min(count,Math.max(0,emptyFields.length-1));
  returnedKeys=new Set();
  for(let i=0;i<actual;i++){
    const{k,x,y}=emptyFields[i];
    board[k]={owner:player,ch:letterAt(x,y)};
    returnedKeys.add(k);
  }
  setTimeout(()=>{returnedKeys=new Set();},700);
  return actual;
}

// Steine einzeln einfliegenlassen (400ms Abstand) mit Callback wenn fertig
function returnStonesAnimated(player,count,onDone){
  // Während Steine einfliegen: Mini-Brett zeigt Stand nach Elimination
  prevBoard=postPushBoard?JSON.parse(JSON.stringify(postPushBoard)):prevBoard;
  render();

  // Felder der eliminierten Steine — dort nicht zurückplatzieren
  const eliminatedKeys=new Set();
  if(prevBoard){
    for(const k in prevBoard){
      if(prevBoard[k]&&prevBoard[k].owner!==player&&!board[k])eliminatedKeys.add(k);
    }
  }

  // Wörter die VOR dem Zug existierten — wir wollen sie nicht neu entstehen lassen
  const preExistingWords=prevBoard?findAllWords(prevBoard):[];
  const preWordCells=new Set(preExistingWords.flatMap(w=>w.cells));

  // Kandidatenfelder: leer, nicht eliminierte Position, kein altes Wortfeld
  let emptyFields=[];
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    const k=K(x,y);
    if(!board[k]&&!eliminatedKeys.has(k)&&!preWordCells.has(k))emptyFields.push({k,x,y});
  }
  // Fallback: wenn zu wenig Felder übrig, auch Wortfelder erlauben (aber nicht eliminierte Positionen)
  if(emptyFields.length<count){
    emptyFields=[];
    for(let y=0;y<G;y++)for(let x=0;x<G;x++){
      const k=K(x,y);
      if(!board[k]&&!eliminatedKeys.has(k))emptyFields.push({k,x,y});
    }
  }
  // Letzter Fallback: alle leeren Felder
  if(emptyFields.length===0){
    for(let y=0;y<G;y++)for(let x=0;x<G;x++){const k=K(x,y);if(!board[k])emptyFields.push({k,x,y});}
  }

  for(let i=emptyFields.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[emptyFields[i],emptyFields[j]]=[emptyFields[j],emptyFields[i]];}
  const actual=Math.min(count,Math.max(0,emptyFields.length-1));
  if(actual===0){if(onDone)setTimeout(onDone,200);return 0;}
  comment=comment.replace(/ <span style="opacity:.5">— drücke WEITER<\/span>/,'');
  comment+=` <span style="color:#93c5fd;font-weight:900;font-size:14px">✦ ${actual} ${actual===1?"Buchstabe kehrt zurück":"Buchstaben kehren zurück"} ✦</span>`;
  for(let i=0;i<actual;i++){
    const{k,x,y}=emptyFields[i];
    setTimeout(()=>{
      board[k]={owner:player,ch:letterAt(x,y)};
      returnedKeys=new Set([k]);
      render();
      setTimeout(()=>{returnedKeys.delete(k);},1800);
      if(i===actual-1){
        setTimeout(()=>{returnedKeys=new Set();if(onDone)onDone(actual);},1400);
      }
    },i*1600);
  }
  return actual;
}

// ═══════════════════════════════════════════
//  WORT-HIGHLIGHTING
// ═══════════════════════════════════════════
function applyWordHL(newWords){
  wordHLMap={};wordLabels=[];
  const maxLen=Math.max(...newWords.map(w=>w.word.length));
  const bestWords=newWords.filter(w=>w.word.length===maxLen);
  for(const w of bestWords){
    const cls=w.dir==="row"?"hl-row":"hl-col";
    for(const c of w.cells)wordHLMap[c]=cls;
    const mid=w.cells[Math.floor(w.cells.length/2)];
    const{x,y}=PK(mid);
    wordLabels.push({x,y,word:w.word,cls:w.dir==="row"?"":"col"});
  }
}

function animateWordBirth(newWords,onDone){
  if(!newWords||newWords.length===0){if(onDone)onDone();return;}
  const maxLen=Math.max(...newWords.map(w=>w.word.length));
  const w=newWords.find(x=>x.word.length===maxLen)||newWords[0];
  const word=w.word;
  const isRow=w.dir==="row";
  const color=isRow?"#4caf50":"#42a5f5";

  // Phase 1: Buchstaben sequenziell aufleuchten (80ms pro Buchstabe)
  const be=document.querySelector(".board");
  if(be){
    w.cells.forEach((k,i)=>{
      setTimeout(()=>{
        const{x,y}=PK(k);
        const cellEl=be.querySelector(`[data-k="${k}"]`)||
          [...be.querySelectorAll('.cell')].find((_,idx)=>{
            const cx=idx%G,cy=Math.floor(idx/G);return cx===x&&cy===y;
          });

          const tileEl=cellEl.querySelector('.tile');
          if(tileEl){

              if(tileEl){tileEl.style.animation='';tileEl.style.boxShadow='';}

          }
        }
      },i*80);
    });

  // Phase 2: Großes Wort-Overlay — zentriert, so gross wie möglich
  const totalLetterTime=w.cells.length*80+100;
  setTimeout(()=>{
    const isMob=window.innerWidth<600;
    const overlay=document.createElement("div");
    const fontSize=isMob
      ?Math.min(96,Math.floor(window.innerWidth*0.8/Math.max(word.length,3)))
      :Math.min(72,44+word.length*2);
    if(isMob){
      // Auf Mobile: über den ganzen Screen, fix positioniert
      overlay.style.cssText=`position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.55);animation:wordReveal .5s cubic-bezier(.34,1.56,.64,1) forwards`;
    } else {
      const vp=document.getElementById("boardVP");
      if(!vp)return;
      vp.style.position='relative';
      vp.appendChild(overlay);
      overlay.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;text-align:center;animation:wordReveal .5s cubic-bezier(.34,1.56,.64,1) forwards`;
    }
    overlay.innerHTML=`
      <div style="font-size:${fontSize}px;font-weight:900;color:${color};letter-spacing:${isMob?6:4}px;text-shadow:0 0 40px ${color}cc,0 0 80px ${color}66,0 0 120px ${color}33;font-family:Georgia,serif;line-height:1.1">${word}</div>
      <div style="font-size:${isMob?18:13}px;color:rgba(255,255,255,.5);letter-spacing:4px;margin-top:${isMob?16:4}px">${isRow?"REIHE":"SPALTE"}</div>`;
    if(isMob)document.body.appendChild(overlay);
    _wordOverlay=overlay;
  },totalLetterTime);

  const totalTime=totalLetterTime+2600;
  if(onDone)setTimeout(onDone,totalTime);
}

function animateFall(push){

// ═══════════════════════════════════════════
//  KI — NEUE BEWERTUNGSLOGIK v5
// ═══════════════════════════════════════════
function kiPickBestMove(b,player){
  const opp=player===P1?P2:P1;
  const myCount=cnt(b,player);
  const oppCount=cnt(b,opp);
  const beforeWords=findAllWords(b);
  const bSet=new Set(beforeWords.map(wordKey));

  let best=null,bestScore=-99999;

  // Alle Push-Züge bewerten
  const pushM=getPushMoves(b,player);
  // Anfänger: nur ersten 60% der Züge prüfen, zufällig gemischt
  const pushList=kiLevel===1?shuffled(pushM).slice(0,Math.max(1,Math.floor(pushM.length*0.6))):pushM;
  for(const p of pushList){
    const nb=applyPush(b,p);
    const afterWords=findAllWords(nb);
    const newWords=afterWords.filter(w=>!bSet.has(wordKey(w)));
    const longestWord=newWords.length>0?Math.max(...newWords.map(w=>w.word.length)):0;
    const hasWord=newWords.length>0;
    const eliminated=p.result.removed.filter(x=>x.owner!==player).length;
    const stonesBack=hasWord?eliminated:0;
    const sc=kiScore(myCount,oppCount,eliminated,stonesBack,longestWord,cnt(nb,opp),false);
    if(sc>bestScore){bestScore=sc;best={push:p,jumped:false,result:p.result};}
  }

  // Sprung+Push-Züge: Anfänger macht das nie, Normal manchmal, Experte immer
  const doJump=kiLevel===1?false:kiLevel===2?true:true;
  const emptyCount=G*G-Object.keys(b).length;
  if(doJump&&emptyCount>0){
    const myTiles=[];
    for(const k in b)if(b[k]&&b[k].owner===player)myTiles.push(PK(k));
    for(const t of myTiles){
      let targets=[];
      for(let jy=0;jy<G;jy++)for(let jx=0;jx<G;jx++){
        if(!b[K(jx,jy)])targets.push({x:jx,y:jy});
      }
      const near=targets.filter(j=>{
        for(const di of DIRS){const nx=j.x+di.dx,ny=j.y+di.dy;if(nx>=0&&nx<G&&ny>=0&&ny<G&&b[K(nx,ny)]&&b[K(nx,ny)].owner===opp)return true;}return false;
      });
      // Experte prüft mehr Sprungziele
      const maxTargets=kiLevel===3?35:20;
      const tList=(near.length>0?near:targets).slice(0,maxTargets);
      for(const jt of tList){
        const bj=applyJump(b,t.x,t.y,jt.x,jt.y);
        const pushes=getPushesFrom(bj,player,jt.x,jt.y);
        for(const pf of pushes){
          const nb2=applyPush(bj,pf);
          const aw2=findAllWords(nb2);
          const nw2=aw2.filter(w=>!bSet.has(wordKey(w)));
          const lw2=nw2.length>0?Math.max(...nw2.map(w=>w.word.length)):0;
          const el2=pf.result.removed.filter(x=>x.owner!==player).length;
          const sb2=nw2.length>0?el2:0;
          const sc2=kiScore(myCount,oppCount,el2,sb2,lw2,cnt(nb2,opp),true);
          if(sc2>bestScore){
            bestScore=sc2;
            best={push:pf,jumped:true,jump:{fromX:t.x,fromY:t.y,toX:jt.x,toY:jt.y,ch:b[K(t.x,t.y)].ch},result:pf.result};
          }
        }
      }
    }
  }

  // Experte: Gegenzug simulieren — wenn Mensch danach viele Optionen hat, Score reduzieren
  if(kiLevel===3&&best){
    const nb=best.jumped
      ?applyPush(applyJump(b,best.jump.fromX,best.jump.fromY,best.jump.toX,best.jump.toY),best.push)
      :applyPush(b,best.push);
    const oppMoves=getPushMoves(nb,opp).length;
    if(oppMoves>8)bestScore-=oppMoves*2; // viele Gegneroptionen = schlechter
  }

  return best;
}

function shuffled(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function kiScore(myCount,oppCount,eliminated,stonesBack,longestWord,oppAfter,isJump){
  let sc=0;
  // Elimination ist gut
  sc+=eliminated*10;
  // Todesstoß-Bonus (Anfänger erkennt ihn weniger zuverlässig)
  if(oppAfter<=3)sc+=kiLevel===1?100:300;
  else if(oppAfter<=6)sc+=kiLevel===1?20:60;
  else if(oppAfter<=10)sc+=kiLevel===1?5:20;
  // Wortbildung: Anfänger ignoriert sie weitgehend
  if(stonesBack>0&&kiLevel>1){
    sc+=stonesBack*10;
    const totalStones=myCount+oppCount;
    if(totalStones>30)sc+=stonesBack*(kiLevel===3?10:8);
    else if(totalStones>20)sc+=stonesBack*(kiLevel===3?7:5);
    if(myCount<=10)sc+=stonesBack*15;
    if(myCount<=6)sc+=stonesBack*25;
    if(longestWord>=6)sc+=kiLevel===3?40:30;
    else if(longestWord>=5)sc+=kiLevel===3?25:18;
    else if(longestWord>=4)sc+=kiLevel===3?12:8;
  }
  // Sprungbonus
  if(isJump)sc+=5;
  // Tiebreaker — Anfänger hat mehr Zufall
  sc+=Math.random()*(kiLevel===1?12:kiLevel===2?3:1);
  return sc;
}

// ═══════════════════════════════════════════
//  SPIEL STARTEN
// ═══════════════════════════════════════════
function startBoardReveal(){
  currentBoardDef=pickBoard();
  const preset=currentBoardDef;
  const baseBoard=buildStartBoard(preset);
  revealBoard={};revealOwners={};revealOrder=[];revealProgress=0;revealDone=false;
  // Vorschau-Farben zufällig erzeugen (ca. 50/50)
  const keys=Object.keys(baseBoard);
  const shuffled=[...keys];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  const half=Math.ceil(shuffled.length/2);
  shuffled.forEach((k,i)=>{revealOwners[k]=i<half?P1:P2;});
  // Enthüllungsreihenfolge: zeilenweise
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){
    const k=K(x,y);if(baseBoard[k])revealOrder.push(k);
  }
  simPhase="board-reveal";render();
  setTimeout(()=>revealTick(),120);
}

function revealTick(){
  if(revealProgress>=revealOrder.length){
    revealDone=true;render();return;
  }
  const k=revealOrder[revealProgress];
  const{x,y}=PK(k);
  revealBoard[k]={owner:P1,ch:currentBoardDef.rows[y][x]};
  revealProgress++;render();
  const col=PK(revealOrder[revealProgress-1]).x;
  const delay=col===0&&revealProgress>1?360:110;
  revealTimer=setTimeout(()=>revealTick(),delay);
}

function chooseStarter(humanStarts){
  humanStartsGame=humanStarts;
  simPhase="color-pick";render();
  if(humanStarts){
    // KI wählt Farbe (zufällig, mit Denkpause)
    setTimeout(()=>{
      const kiTakesGold=Math.random()<0.5;
      aiPlayer=kiTakesGold?P1:P2;
      humanPlayer=kiTakesGold?P2:P1;
      turn=humanPlayer; // Mensch beginnt
      simPhase="ki-decided";render();
    },2200);
  }
  // wenn KI beginnt: Mensch wählt Farbe → wartet auf chooseColor()
}

function chooseColor(color){
  // Nur erreichbar wenn KI beginnt (humanStartsGame===false)
  humanPlayer=color==="gold"?P1:P2;
  aiPlayer=color==="gold"?P2:P1;
  turn=aiPlayer; // KI beginnt
  simPhase="ki-decided";render();
}

function startGame(){
  const preset=currentBoardDef;
  const baseBoard=buildStartBoard(preset);
  // Exakt dieselbe Verteilung wie im Startbrett-Vorschau verwenden
  board={};
  for(const k in baseBoard){
    board[k]={...baseBoard[k],owner:revealOwners[k]||P1};
  }
  moveNum=0;gameEnding=false;wordHLMap={};wordLabels=[];
  comment="";commentCls="";history=[];returnedKeys=new Set();prevBoard=null;postPushBoard=null;gameStats={p1elim:0,p1words:0,p1ret:0,p2elim:0,p2words:0,p2ret:0,missedMoves:[]};
  simPhase="pushing";
}

function checkGameEnd(){
  const c1=cnt(board,P1),c2=cnt(board,P2);
  if(c1>3&&c2>3)return false;
  gameEnding=true;
  const loser=c1<=3?P1:P2;
  const winner=loser===P1?P2:P1;
  const loserCount=Math.min(c1,c2);
  let msg="";
  if(winner===humanPlayer){
    msg=`<b style="color:#4caf50">🏆 Du gewinnst!</b> Bot hat nur noch ${loserCount} ${loserCount===1?"Buchstaben":"Buchstaben"}.`;
  } else {
    msg=`<b style="color:#ef4444">Bot gewinnt.</b> Du hast nur noch ${loserCount} ${loserCount===1?"Buchstaben":"Buchstaben"}.`;
  }
  comment=`<b>🏁 SPIELENDE</b><br>${msg}`;commentCls="gold";
  wordHLMap={};wordLabels=[];
  render();
  setTimeout(()=>{simPhase="gameover";render();},3500);
  return true;
}

// ═══════════════════════════════════════════
//  MENSCHLICHER ZUG
// ═══════════════════════════════════════════
function startHumanTurn(){
  hPhase="select";hSel=null;hDest=null;hintOn=false;
  const allMoves=getPushMoves(board,humanPlayer);
  let hasMoves=allMoves.length>0;
  if(!hasMoves){
    for(const k in board){
      const tile=board[k];if(!tile||tile.owner!==humanPlayer)continue;
      const{x,y}=PK(k);
      for(let jy=0;jy<G&&!hasMoves;jy++)for(let jx=0;jx<G&&!hasMoves;jx++){
        if(board[K(jx,jy)])continue;
        const bj=applyJump(board,x,y,jx,jy);
        if(getPushesFrom(bj,humanPlayer,jx,jy).length>0)hasMoves=true;
      }
    }
  }
  if(!hasMoves){
    comment="Keine legalen Züge für dich — Bot ist wieder dran.";commentCls="ai";
    hPhase="idle";render();timer=setTimeout(()=>humanAITurn(),1500);return;
  }
  setHumanComment();render();
}

function setHumanComment(){
  if(hPhase==="select"){
    comment="<b>Dein Zug!</b> Wähle einen deiner Buchstaben.";commentCls="human";
  } else if(hPhase==="selected"&&hSel){
    const ch=board[K(hSel.x,hSel.y)]?.ch||"?";
    const col="ABCDEFG"[hSel.x];const row=hSel.y+1;
    const dp=getPushesFrom(board,humanPlayer,hSel.x,hSel.y);
    if(dp.length===0){
      comment=`<b>${ch}</b> (${col}${row}) — kein direkter Schiebeweg. Springe zuerst <span style="color:#93c5fd">✦</span>, dann schieben.`;commentCls="human";
    } else {
      comment=`<b>${ch}</b> (${col}${row}) gewählt. Springe <span style="color:#93c5fd">✦</span> oder drücke einen Pfeil.`;commentCls="human";
    }
  } else if(hPhase==="jumped"&&hDest){
    const ch=board[K(hDest.x,hDest.y)]?.ch||"?";
    const fromCol="ABCDEFG"[hSel.x],fromRow=hSel.y+1;
    const col="ABCDEFG"[hDest.x];const row=hDest.y+1;
    comment=`<b>${ch}</b> springt von ${fromCol}${fromRow} nach <b>${col}${row}</b>. Wähle jetzt einen Pfeil.`;commentCls="human";
  }
}

function handleCellClick(x,y){
  if(turn!==humanPlayer||simPhase!=="pushing"||gameEnding)return;
  const k=K(x,y);
  if(hPhase==="select"){
    if(board[k]&&board[k].owner===humanPlayer){hSel={x,y};hPhase="selected";setHumanComment();render();}
  } else if(hPhase==="selected"){
    if(board[k]&&board[k].owner===humanPlayer){hSel={x,y};setHumanComment();render();return;}
    if(!board[k]){
      // Sprungziel?
      const bj=applyJump(board,hSel.x,hSel.y,x,y);
      if(getPushesFrom(bj,humanPlayer,x,y).length>0||getPushesFrom(bj,humanPlayer,x,y).length===0){
        hDest={x,y};hPhase="jumped";
        board=applyJump(board,hSel.x,hSel.y,x,y);
        setHumanComment();render();
      }
    }
  } else if(hPhase==="jumped"){
    if(board[k]&&board[k].owner===humanPlayer){
      // Neuen Stein wählen — Sprung rückgängig nicht möglich, aber neuen Stein auswählen
      hPhase="select";hSel=null;hDest=null;
      // Undo des Sprungs über history nicht nötig hier, nutze onBack
    }
  }
}

function humanPushExact(idx){
  if(turn!==humanPlayer||simPhase!=="pushing"||gameEnding)return;
  const origin=hDest||hSel;if(!origin)return;
  const currentBoard=board;
  const pushes=getPushesFrom(currentBoard,humanPlayer,origin.x,origin.y);
  const p=pushes[idx];if(!p)return;
  const pieceCh=currentBoard[K(origin.x,origin.y)]?.ch||"?";
  const jumped=!!hDest;
  const beforeWords=findAllWords(currentBoard);
  moveNum++;
  saveSnap();
  animateFall(p);
  if(jumped){
    humanDoPush({push:p,jumped:true,jump:{fromX:hSel.x,fromY:hSel.y,toX:hDest.x,toY:hDest.y,ch:pieceCh},result:p.result},p,pieceCh,beforeWords);
  } else {
    humanDoPush({push:p,jumped:false,result:p.result},p,pieceCh,beforeWords);
  }
}

function humanDoPush(result,push,pieceCh,beforeWords){
  // Wahrnehmungs-Spiegel: was hätte die KI hier gesehen?
  const boardBeforePush=JSON.parse(JSON.stringify(board));
  const kiOptimal=kiPickBestMove(boardBeforePush,humanPlayer);
  prevBoard=JSON.parse(JSON.stringify(board)); // Brett VOR dem Zug
  board=applyPush(board,push);
  postPushBoard=JSON.parse(JSON.stringify(board)); // Brett nach Elimination
  const afterWords=findAllWords(board);
  const newWords=getNewWords(beforeWords,afterWords);
  hPhase="idle";hSel=null;hDest=null;hintOn=false;
  const kills=push.result.removed.filter(x=>x.owner!==humanPlayer).length;
  gameStats[humanPlayer===P1?'p1elim':'p2elim']+=kills;
  // Vergleich: Hat der Mensch das Optimum gesehen?
  if(kiOptimal&&kiOptimal.push){
    const kiPush=kiOptimal.push;
    const kiBoard=kiOptimal.jumped
      ?applyPush(applyJump(boardBeforePush,kiOptimal.jump.fromX,kiOptimal.jump.fromY,kiOptimal.jump.toX,kiOptimal.jump.toY),kiPush)
      :applyPush(boardBeforePush,kiPush);
    const kiWords=getNewWords(findAllWords(boardBeforePush),findAllWords(kiBoard));
    const kiKills=kiPush.result.removed.filter(x=>x.owner!==humanPlayer).length;
    const humanWords=newWords;
    const humanKills=kills;
    // Nur speichern wenn KI deutlich besser: mehr Wörter oder längeres Wort oder mehr Kills
    const kiLongest=kiWords.length>0?Math.max(...kiWords.map(w=>w.word.length)):0;
    const huLongest=humanWords.length>0?Math.max(...humanWords.map(w=>w.word.length)):0;
    const significantly_better=(kiWords.length>0&&humanWords.length===0)||(kiLongest>=huLongest+2)||(kiKills>humanKills+1);
    if(significantly_better&&gameStats.missedMoves.length<5){
      gameStats.missedMoves.push({
        moveNum,
        kiWords:kiWords.map(w=>w.word),
        kiLongest,
        kiKills,
        humanWords:humanWords.map(w=>w.word),
        humanKills,
        kiMove:{x:kiPush.x,y:kiPush.y,dir:kiPush.dir.n,destX:kiPush.destX,destY:kiPush.destY},
        jumped:kiOptimal.jumped||false,
        jumpFrom:kiOptimal.jumped?{x:kiOptimal.jump.fromX,y:kiOptimal.jump.fromY}:null,
        jumpTo:kiOptimal.jumped?{x:kiOptimal.jump.toX,y:kiOptimal.jump.toY}:null
      });
    }
  }
  if(newWords.length>0){
    applyWordHL(newWords);
    const longestWord=Math.max(...newWords.map(w=>w.word.length));
    const bestWords=newWords.filter(w=>w.word.length===longestWord);
    const wNames=bestWords.map(w=>`<span style="color:${w.dir==="row"?"#4caf50":"#42a5f5"};font-weight:900">${w.word}</span>`).join(" · ");
    const fromCol=String.fromCharCode(65+push.x),fromRow=push.y+1;
    const toCol=String.fromCharCode(65+push.destX),toRow=push.destY+1;
    gameStats[humanPlayer===P1?'p1words':'p2words']++;
    comment=`Zug ${moveNum} — Du schiebst <b>${pieceCh}</b> ${fromCol}${fromRow}→${toCol}${toRow} · ${kills} eliminiert · ${wNames}`;
    const kiReact=botReactToHumanVoice(kills,newWords,board,aiPlayer,humanPlayer);
    if(kiReact)comment+=`<span class="bot-voice">Bot: „${kiReact}"</span>`;
    comment+=` <span style="opacity:.5">— drücke WEITER</span>`;
    commentCls="hl";
    pendingNextTurn=()=>{
      if(_wordOverlay){_wordOverlay.style.animation='wordOverlay .3s ease-in forwards';setTimeout(()=>{if(_wordOverlay)_wordOverlay.remove();_wordOverlay=null;},300);}
      if(checkGameEnd())return;
      returnStonesAnimated(humanPlayer,kills,(actual)=>{
        gameStats[humanPlayer===P1?'p1ret':'p2ret']+=actual||kills;
        turn=aiPlayer;
        pendingNextTurn=()=>humanAITurn();
        render();
      });
    };
    render();
    // Wort-Geburt animieren
    animateWordBirth(newWords,null);
  } else {
    wordHLMap={};wordLabels=[];
    const fromCol3=String.fromCharCode(65+push.x),fromRow3=push.y+1;
    const toCol3=String.fromCharCode(65+push.destX),toRow3=push.destY+1;
    comment=`Zug ${moveNum} — Du schiebst <b>${pieceCh}</b> ${fromCol3}${fromRow3}→${toCol3}${toRow3} · ${kills} eliminiert · <span style="opacity:.5">kein Wort</span>`;
    commentCls="human";
    pendingNextTurn=()=>{
      if(checkGameEnd())return;
      turn=aiPlayer;
      pendingNextTurn=()=>humanAITurn();
      render();
    };
    render();
  }
}

function humanAITurn(){
  if(gameEnding)return;
  const result=kiPickBestMove(board,aiPlayer);
  if(!result){
    comment="Bot hat keine Züge — du bist wieder dran!";commentCls="ai";
    turn=humanPlayer;render();timer=setTimeout(()=>startHumanTurn(),1500);return;
  }
  // Denkpause: 2.5–4.5s
  comment=botThinkingMsg(board,aiPlayer,humanPlayer);
  commentCls="ai";render();
  const thinkTime=2500+Math.floor(Math.random()*2000);
  timer=setTimeout(()=>humanAIExecute(result),thinkTime);
}

function humanAIExecute(result){
  if(gameEnding)return;
  const push=result.push;
  const pieceCh=result.jumped?result.jump.ch:(board[K(push.x,push.y)]?.ch||"?");
  moveNum++;
  saveSnap();
  if(result.jumped){
    const fc=String.fromCharCode(65+result.jump.fromX),fr=result.jump.fromY+1;
    const tc=String.fromCharCode(65+result.jump.toX),tr=result.jump.toY+1;
    // Phase 1: Sprung zeigen — pausieren bis WEITER
    prevBoard=JSON.parse(JSON.stringify(board)); // Mini: Brett vor Sprung
    board=applyJump(board,result.jump.fromX,result.jump.fromY,result.jump.toX,result.jump.toY);
    comment=`Zug ${moveNum} — Bot springt <b>${pieceCh}</b> ${fc}${fr}→${tc}${tr} <span style="opacity:.5">— drücke WEITER</span>`;
    commentCls="ai";
    pendingNextTurn=()=>{
      // Phase 2: Schub ausführen
      humanAIDoPush(result,push,pieceCh,findAllWords(board));
    };
    render();
  } else {
    humanAIDoPush(result,push,pieceCh,findAllWords(board));
  }
}

function humanAIDoPush(result,push,pieceCh,beforeWords){
  animateFall(push);
  // Mini-Brett zeigt immer den Stand VOR dem aktuellen Schritt
  // Bei Sprung: prevBoard = Brett nach Sprung (wurde gerade auf grossem Brett gezeigt)
  // Bei direktem Push: prevBoard = Brett vor Push
  if(!result.jumped) prevBoard=JSON.parse(JSON.stringify(board));
  else prevBoard=JSON.parse(JSON.stringify(board)); // board ist hier bereits nach Sprung
  postPushBoard=null;
  board=applyPush(board,push);
  postPushBoard=JSON.parse(JSON.stringify(board));
  const afterWords=findAllWords(board);
  const newWords=getNewWords(beforeWords,afterWords);
  const kills=push.result.removed.filter(x=>x.owner!==aiPlayer).length;
  gameStats[aiPlayer===P1?'p1elim':'p2elim']+=kills;

  if(newWords.length>0){
    applyWordHL(newWords);
    const longestWord=Math.max(...newWords.map(w=>w.word.length));
    const bestWords=newWords.filter(w=>w.word.length===longestWord);
    const wNames=bestWords.map(w=>`<span style="color:${w.dir==="row"?"#4caf50":"#42a5f5"};font-weight:900">${w.word}</span>`).join(" · ");
    const fromCol=String.fromCharCode(65+push.x),fromRow=push.y+1;
    const toCol=String.fromCharCode(65+push.destX),toRow=push.destY+1;
    gameStats[aiPlayer===P1?'p1words':'p2words']++;
    comment=`Zug ${moveNum} — Bot schiebt <b>${pieceCh}</b> ${fromCol}${fromRow}→${toCol}${toRow} · ${kills} eliminiert · ${wNames}`;
    comment+=` <span style="opacity:.5">— drücke WEITER</span>`;
    commentCls="hl";
    pendingNextTurn=()=>{
      if(_wordOverlay){_wordOverlay.style.animation='wordOverlay .3s ease-in forwards';setTimeout(()=>{if(_wordOverlay)_wordOverlay.remove();_wordOverlay=null;},300);}
      if(checkGameEnd())return;
      returnStonesAnimated(aiPlayer,kills,(actual)=>{
        gameStats[aiPlayer===P1?'p1ret':'p2ret']+=actual||kills;
        turn=humanPlayer;
        pendingNextTurn=()=>startHumanTurn();
        render();
      });
    };
    render();
    animateWordBirth(newWords,null);
  } else {
    wordHLMap={};wordLabels=[];
    const fromCol2=String.fromCharCode(65+push.x),fromRow2=push.y+1;
    const toCol2=String.fromCharCode(65+push.destX),toRow2=push.destY+1;
    comment=`Zug ${moveNum} — Bot schiebt <b>${pieceCh}</b> ${fromCol2}${fromRow2}→${toCol2}${toRow2} · ${kills} eliminiert · <span style="opacity:.5">kein Wort</span>`;    comment+=` <span style="opacity:.5">— drücke WEITER</span>`;
    commentCls="ai";
    pendingNextTurn=()=>{
      if(checkGameEnd())return;
      turn=humanPlayer;
      pendingNextTurn=()=>startHumanTurn();
      render();
    };
    render();
  }
}

function renderBoardHtml(){
  const COLS="ABCDEFG";
  let html=`<div class="board" style="grid-template-columns:repeat(${G},${CELL}px);gap:${GAP}px;position:relative">`;

          const bj=applyJump(board,hSel.x,hSel.y,x,y);
          if(getPushesFrom(bj,humanPlayer,x,y).length>0)cellCls+=" h-free";
        }
        inner=`<span style="font-size:11px;color:rgba(255,255,255,.15)">${ch}</span>`;
      }
      html+=`<div class="${cellCls}" style="width:${CELL}px;height:${CELL}px" onclick="handleCellClick(${x},${y})">${inner}</div>`;
    }
  }
  html+="</div>";
  // Labels
  html+=`<div style="position:absolute;top:-14px;left:0;display:flex;gap:${GAP}px">`;
  for(let x=0;x<G;x++)html+=`<div style="width:${CELL}px;text-align:center;font-size:8px;color:rgba(255,255,255,.55);font-weight:700">${COLS[x]}</div>`;
  html+="</div>";
  for(let y=0;y<G;y++)html+=`<div style="position:absolute;left:-14px;top:${y*(CELL+GAP)}px;height:${CELL}px;display:flex;align-items:center;font-size:8px;color:rgba(255,255,255,.55);font-weight:700">${y+1}</div>`;
  // Pfeile
  if(simPhase==="pushing"&&!gameEnding&&turn===humanPlayer){
    const origin=hDest||hSel;
    if(origin&&(hPhase==="selected"||hPhase==="jumped")){
      const pushes=getPushesFrom(board,humanPlayer,origin.x,origin.y);
      const validDirs=new Set(pushes.map(p=>p.dir.n));
      for(const dir of DIRS){
        const ox=origin.x*(CELL+GAP),oy=origin.y*(CELL+GAP);
        let lx=ox+CELL/2-17,ly=oy+CELL/2-17;
        // Basis-Position: ausserhalb des Steins in Schieberichtung
        if(dir.dx===1) lx=ox+CELL+2;
        else if(dir.dx===-1) lx=ox-36;
        else if(dir.dy===1) ly=oy+CELL+2;
        else if(dir.dy===-1) ly=oy-36;
        // Wenn ausserhalb Brettbereich: auf die Gegenseite spiegeln (innerhalb)
        const boardPx=G*(CELL+GAP);
        if(lx<0) lx=ox+CELL+2;
        if(lx>boardPx-20) lx=ox-36;
        if(ly<0) ly=oy+CELL+2;
        if(ly>boardPx-20) ly=oy-36;
        if(validDirs.has(dir.n)){
          const matching=pushes.map((p,i)=>({p,i})).filter(({p})=>p.dir.n===dir.n);
          if(matching.length===1){
            html+=`<div class="push-arrow ok" style="left:${lx}px;top:${ly}px" onclick="humanPushExact(${matching[0].i})">${dir.n}</div>`;
          } else {
            // Mehrere Optionen — zeige jede mit Eliminierungszahl
            matching.forEach(({p,i},n)=>{
              const kills=p.result.removed.filter(x=>x.owner!==humanPlayer).length;
              const step=36;
              const mid=Math.floor(matching.length/2);
              const offset=(n-mid)*step;
              let ox=lx,oy=ly;
              if(dir.dx!==0) oy=ly+offset; // Links/Rechts schieben → vertikal stapeln
              else ox=lx+offset;            // Oben/Unten schieben → horizontal stapeln
              html+=`<div style="position:absolute;left:${ox}px;top:${oy}px;width:34px;height:34px;border-radius:8px;background:rgba(245,158,11,.9);border:2px solid #f59e0b;cursor:pointer;z-index:18;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(245,158,11,.45)" onclick="humanPushExact(${i})"><span style="font-size:15px;font-weight:900;color:#3a1a00;line-height:1">${dir.n}</span><span style="font-size:9px;font-weight:900;color:#3a1a00;line-height:1.2">×${kills}</span></div>`;
            });
          }
        } else {
          html+=`<div class="push-arrow bad" style="left:${lx}px;top:${ly}px">${dir.n}</div>`;
        }
      }
    }
  }
  // Wort-Labels
  for(const lbl of wordLabels){
    const lx=lbl.x*(CELL+GAP),ly=lbl.y*(CELL+GAP)-14;
    const isCol=lbl.cls==="col";
    html+=`<div class="word-label" style="left:${lx}px;top:${ly}px;color:${isCol?"#42a5f5":"#4caf50"};background:${isCol?"rgba(26,31,42,.9)":"rgba(26,42,26,.9)"};border-color:${isCol?"#42a5f5":"#4caf50"}">${lbl.word}</div>`;
  }
  return html;
}

function renderRevealScreen(){

  let bHtml=`<div class="board" style="grid-template-columns:repeat(${G},${CELL}px);gap:${GAP}px;position:relative">`;
  for(let y=0;y<G;y++){

function onPlay(){
  if(simPhase==="init"){
    saveSnap();simPhase="pushing";wordHLMap={};wordLabels=[];
    const humanColor=humanPlayer===P1?"Gold":"Rot";
    const kiColor=aiPlayer===P1?"Gold":"Rot";
    const starter=turn===humanPlayer?"Du beginnst.":"Bot beginnt.";
    comment=`Du spielst <b style="color:${humanPlayer===P1?"#f59e0b":"#ef4444"}">${humanColor}</b> · Bot spielt <b style="color:${aiPlayer===P1?"#f59e0b":"#ef4444"}">${kiColor}</b>. ${starter}`;
    commentCls="human";render();
    if(turn===humanPlayer)timer=setTimeout(()=>startHumanTurn(),2500);
    else timer=setTimeout(()=>humanAITurn(),3000);
  } else if(pendingNextTurn){
    const fn=pendingNextTurn;pendingNextTurn=null;
    wordHLMap={};wordLabels=[];fn();
  }
}

function onBack(){
  if(timer)clearTimeout(timer);timer=null;
  pendingNextTurn=null;
  if(simPhase==="board-reveal"){
    if(revealTimer)clearTimeout(revealTimer);
    fullReset();simPhase="intro";render();return;
  }
  if(simPhase==="color-pick"){simPhase="board-reveal";revealDone=true;render();return;}
  if(simPhase==="init"){fullReset();simPhase="intro";render();return;}
  if(simPhase==="pushing"&&turn===humanPlayer&&!gameEnding){
    if(hPhase==="selected"){hSel=null;hDest=null;hPhase="select";hintOn=false;setHumanComment();render();return;}
  }
  if(!history.length)return;
  const snap=JSON.parse(history.pop());
  restoreSnap(snap);
  hintOn=false;returnedKeys=new Set();
  // Zeige wiederhergestellten Stand — warte auf WEITER
  // pendingNextTurn sorgt dafür dass WEITER den richtigen Zug startet
  if(simPhase==="pushing"&&!gameEnding){
    if(turn===humanPlayer){
      pendingNextTurn=()=>startHumanTurn();
    } else {
      pendingNextTurn=()=>humanAITurn();
    }
  }
  render();
}

function onHint(){
  if(turn!==humanPlayer||simPhase!=="pushing"||gameEnding)return;
  hintOn=!hintOn;
  if(hintOn){
    const best=kiPickBestMove(board,humanPlayer);
    if(best&&best.push){
      const p=best.push;
      if(best.jumped&&best.jump){
        // Sprung+Push: zeige den Stein an seiner aktuellen Position (vor Sprung)
        const fromX=best.jump.fromX,fromY=best.jump.fromY;
        hSel={x:fromX,y:fromY};hDest=null;hPhase="selected";
        const ch=board[K(fromX,fromY)]?.ch||"?";
        const fc=String.fromCharCode(65+fromX),fr=fromY+1;
        const tc=String.fromCharCode(65+best.jump.toX),tr=best.jump.toY+1;
        const pushDir=p.dir.n;
        const pushDest=String.fromCharCode(65+p.destX)+(p.destY+1);
        comment=`💡 Tipp: Springe <b>${ch}</b> ${fc}${fr}→${tc}${tr}, dann schiebe ${pushDir} nach ${pushDest}`;commentCls="human";
      } else {
        hSel={x:p.x,y:p.y};hDest=null;hPhase="selected";
        const ch=board[K(p.x,p.y)]?.ch||"?";
        comment=`💡 Tipp: Schiebe <b>${ch}</b> ${p.dir.n}`;commentCls="human";
      }
    }
  } else {
    setHumanComment();
  }
  render();
}

function updateControls(){
  const bar=document.getElementById("mainControls");if(!bar)return;
  if(simPhase==="intro"||simPhase==="rules"||simPhase==="board-reveal"||simPhase==="color-pick"||simPhase==="ki-decides"||simPhase==="ki-decided"||simPhase==="gameover"){
    bar.style.display="none";return;
  }
  bar.style.display="flex";
  const bb=document.getElementById("btnBack");
  const bp=document.getElementById("btnPlay");
  const bh=document.getElementById("btnHint");
  if(!bb||!bp||!bh)return;
  bb.style.opacity=(history.length>0||simPhase==="init")?"1":"0.25";
  bp.style.display=(simPhase==="init"||!!pendingNextTurn)?"inline-block":"none";
  bh.style.display=(turn===humanPlayer&&simPhase==="pushing"&&!gameEnding)?"inline-block":"none";
  bh.style.opacity=hintOn?"0.4":"1";
}

// ═══════════════════════════════════════════
//  ZOOM / PAN (aus v4 übernommen)
// ═══════════════════════════════════════════
const _isMob=window.innerWidth<600;const _boardPx=7*(42+2)-2+24;const _availW=window.innerWidth-20;let _sc=_isMob?Math.min(1,(_availW-28)/_boardPx):0.82,_tx=_isMob?Math.max(14,(_availW-_boardPx*_sc)/2):36,_ty=_isMob?4:8;
let _lastSimPhase=null;
let _touches={},_lastPinch=null,_lastPanX=null,_lastPanY=null,_isDrag=false,_msx,_msy;
let _touchOnInteractive=false,_touchMoved=false,_touchStartX=0,_touchStartY=0;

function _applyZoom(animate){
  const vp=document.getElementById("boardVP"),inn=document.getElementById("boardInner");
  if(!vp||!inn)return;
  const vw=vp.clientWidth,vh=vp.clientHeight;
  const boardPx=G*(CELL+GAP)+GAP+24;
  const mob=window.innerWidth<600;
  const labelReserve=mob?14:36;
  // Op Mobile: Brett so gross wie möglich
  const fitScale=mob
    ?(vw-labelReserve-4)/boardPx
    :(vw-labelReserve-4)/boardPx;
  if(fitScale<_sc)_sc=fitScale;
  const bw=boardPx*_sc;
  // Auf Mobile: Brett zentrieren
  if(mob){
    _tx=Math.max(labelReserve,(vw-bw)/2);
    _ty=4;
  } else {
    _tx=Math.max(labelReserve,Math.min(vw-bw-4,_tx));
    _ty=Math.max(0,Math.min(6,vh-boardPx*_sc-4),_ty);
  }
  inn.style.transition=animate?"transform .2s ease":"none";
  inn.style.transform=`translate(${_tx}px,${_ty}px) scale(${_sc})`;
  inn.style.opacity="1";
}

const _baseRender=render;
render=function(){
  _baseRender();
  requestAnimationFrame(()=>{
    if(simPhase!==_lastSimPhase){const mob2=window.innerWidth<600;_sc=mob2?1.5:0.82;_tx=mob2?14:36;_ty=mob2?4:8;_lastSimPhase=simPhase;}
    _applyZoom(false);_initPan();
  });
};

function _initPan(){
  const vp=document.getElementById("boardVP");if(!vp||vp._panInit)return;
  vp._panInit=true;
  vp.addEventListener("touchstart",e=>{
    if(e.touches.length===1){
      const t=e.touches[0];
      _touchStartX=t.clientX;_touchStartY=t.clientY;_touchMoved=false;
      const el=document.elementFromPoint(t.clientX,t.clientY);
      _touchOnInteractive=!!(el&&(el.classList.contains("cell")||el.classList.contains("push-arrow")||el.classList.contains("jump-target")));
      _lastPanX=t.clientX;_lastPanY=t.clientY;_isDrag=false;
    } else if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      _lastPinch=Math.sqrt(dx*dx+dy*dy);_lastPanX=null;
    }
    _touches={};for(const t of e.touches)_touches[t.identifier]=t;
  },{passive:true});
  vp.addEventListener("touchmove",e=>{
    if(e.touches.length===2&&_lastPinch){
      e.preventDefault();
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      _sc=Math.max(0.4,Math.min(2.5,_sc*(dist/_lastPinch)));
      _lastPinch=dist;_applyZoom(false);
    } else if(e.touches.length===1&&_lastPanX!==null){
      const t=e.touches[0];
      const dx=t.clientX-_touchStartX,dy=t.clientY-_touchStartY;
      if(!_isDrag&&Math.sqrt(dx*dx+dy*dy)>8)_isDrag=true;
      if(_isDrag&&!_touchOnInteractive){
        e.preventDefault();
        _tx+=t.clientX-_lastPanX;_ty+=t.clientY-_lastPanY;
        _applyZoom(false);
      }
      _lastPanX=t.clientX;_lastPanY=t.clientY;
      if(Math.sqrt(dx*dx+dy*dy)>5)_touchMoved=true;
    }
  },{passive:false});
  vp.addEventListener("touchend",e=>{_lastPinch=null;_lastPanX=null;_isDrag=false;},{passive:true});
  vp.addEventListener("wheel",e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.92:1.08;
    _sc=Math.max(0.4,Math.min(2.5,_sc*delta));_applyZoom(false);
  },{passive:false});
  let _mdx,_mdy,_mpan=false;
  vp.addEventListener("mousedown",e=>{_mdx=e.clientX;_mdy=e.clientY;_mpan=false;_msx=_tx;_msy=_ty;});
  vp.addEventListener("mousemove",e=>{
    if(e.buttons!==1)return;
    const dx=e.clientX-_mdx,dy=e.clientY-_mdy;
    if(!_mpan&&Math.sqrt(dx*dx+dy*dy)>5)_mpan=true;
    if(_mpan){_tx=_msx+dx;_ty=_msy+dy;_applyZoom(false);}
  });
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();
</script>
